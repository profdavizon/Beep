    async function exportStockOutExcel() {
        showAlert('info', '⏳ Generating Excel...');
        
        try {
            await loadXLSX();
            
            // Filter out empty rows
            const filledRows = STATE.stockOutRows.filter(row => 
                row.itemCode || row.itemDescription || row.proposedQty
            );
            
            if (filledRows.length === 0) {
                showAlert('warning', '⚠️ No data to export. Please fill in at least one row.');
                return;
            }
            
            // Create workbook
            const wb = XLSX.utils.book_new();
            
            // Prepare data
            const data = [
                ['STOCK OUT TEMPLATE'],
                ['Date Generated: ' + new Date().toLocaleDateString()],
                ['Branch: ' + (STATE.currentBranch === 'ALL' ? 'All Branches' : STATE.branches.find(b => b.id === STATE.currentBranch)?.name || 'Unknown')],
                ['Generated By: ' + (STATE.user?.email || 'Unknown')],
                [],
                ['Date', 'Item Code', 'Item Description', 'Proposed QTY']
            ];
            
            filledRows.forEach(row => {
                data.push([
                    row.date,
                    row.itemCode,
                    row.itemDescription,
                    row.proposedQty
                ]);
            });
            
            // Create worksheet
            const ws = XLSX.utils.aoa_to_sheet(data);
            
            // Set column widths
            ws['!cols'] = [
                {wch: 12},  // Date
                {wch: 12},  // Item Code (reduced from 15)
                {wch: 35},  // Description
                {wch: 12}   // Qty
            ];
            
            // Add worksheet to workbook
            XLSX.utils.book_append_sheet(wb, ws, 'Stock Out');
            
            // Generate filename
            const filename = 'Stock_Out_Template_' + new Date().toISOString().split('T')[0] + '.xlsx';
            
            // Download
            XLSX.writeFile(wb, filename);
            showAlert('success', '✅ Excel exported: ' + filename);
            
        } catch(e) {
            console.error('Export error:', e);
            showAlert('danger', '❌ Export failed: ' + e.message);
        }
    }
    
    async function exportStockOutPDF() {
        showAlert('info', '⏳ Generating PDF...');
        
        try {
            await loadJsPDF();
            
            // Filter out empty rows
            const filledRows = STATE.stockOutRows.filter(row => 
                row.itemCode || row.itemDescription || row.proposedQty
            );
            
            if (filledRows.length === 0) {
                showAlert('warning', '⚠️ No data to export. Please fill in at least one row.');
                return;
            }
            
            const { jsPDF } = window.jspdf;
            // Portrait orientation for A4
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            
            // Title
            doc.setFontSize(18);
            doc.setFont(undefined, 'bold');
            doc.text('STOCK OUT TEMPLATE', 105, 20, { align: 'center' });
            
            // Metadata
            doc.setFontSize(10);
            doc.setFont(undefined, 'normal');
            doc.text('Date: ' + new Date().toLocaleDateString(), 14, 30);
            doc.text('Branch: ' + (STATE.currentBranch === 'ALL' ? 'All Branches' : STATE.branches.find(b => b.id === STATE.currentBranch)?.name || 'Unknown'), 14, 36);
            doc.text('By: ' + (STATE.user?.email || 'Unknown'), 14, 42);
            
            // Table - optimized for A4 portrait
            const tableData = filledRows.map(row => [
                row.date,
                row.itemCode,
                row.itemDescription,
                row.proposedQty
            ]);
            
            doc.autoTable({
                startY: 50,
                head: [['Date', 'Code', 'Description', 'QTY']],
                body: tableData,
                theme: 'grid',
                headStyles: {
                    fillColor: [16, 185, 129],
                    textColor: 255,
                    fontStyle: 'bold',
                    fontSize: 10
                },
                styles: {
                    fontSize: 9,
                    cellPadding: 2
                },
                columnStyles: {
                    0: {cellWidth: 30},   // Date
                    1: {cellWidth: 25},   // Code
                    2: {cellWidth: 90},   // Description (largest)
                    3: {cellWidth: 25}    // QTY
                },
                margin: { left: 14, right: 14 }
            });
            
            // Footer
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                doc.text('Page ' + i + ' of ' + pageCount, pageWidth / 2, pageHeight - 10, { align: 'center' });
                doc.text('BEEP - Stock Out Template', 14, pageHeight - 10);
            }
            
            // Download
            const filename = 'Stock_Out_' + new Date().toISOString().split('T')[0] + '.pdf';
            doc.save(filename);
            showAlert('success', '✅ PDF exported: ' + filename);
            
        } catch(e) {
            console.error('PDF export error:', e);
            showAlert('danger', '❌ PDF export failed: ' + e.message);
        }
    }

        );
        
        if (filledRows.length === 0) {

    function toggleStockOutRecipient(idx, card) {
        const check = document.getElementById('stockrc_check_' + idx);
        if (window.stockOutSelectedRecipients.has(idx)) {
            window.stockOutSelectedRecipients.delete(idx);
            card.classList.remove('selected');
            if (check) check.style.display = 'none';
        } else {
            window.stockOutSelectedRecipients.add(idx);
            card.classList.add('selected');
            if (check) check.style.display = 'block';
        }
    }
    
    function sendStockOutWhatsApp() {
        if (window.stockOutSelectedRecipients.size === 0) {
            showAlert('warning', '⚠️ Please select at least one recipient');
            return;
        }
        
        const message = window._stockOutMessage || '';
        if (!message) {
            showAlert('danger', '❌ Message not found. Please try again.');
            return;
        }
        
        const contacts = STATE.contacts.filter(c => c.name || c.phone);
        const selected = Array.from(window.stockOutSelectedRecipients).map(i => contacts[i]);
        
        // Send to each selected contact
        selected.forEach(contact => {
            const phone = contact.phone.replace(/[^0-9+]/g, '');
            const encodedMsg = encodeURIComponent(message);
            const url = `https://api.whatsapp.com/send?phone=${phone}&text=${encodedMsg}`;
            window.open(url, '_blank');
        });
        
        showAlert('success', `✅ Opening WhatsApp for ${selected.length} recipient(s)`);
        closeModal();
    }

    function getFormData() {
        const name = document.getElementById('fName').value.trim();
        const category = document.getElementById('fCategory').value;
        const expDate = document.getElementById('fExpDate').value;
        if (!name || !category || !expDate) {
            const alertDiv = document.getElementById('itemAlert') || document.getElementById('editAlert');
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-danger show">❌ Name, Category, and Expiry Date are required.</div>';
            return null;
        }
        // Handle location: use custom if "Custom" selected, else use dropdown value
        const locDropdown = document.getElementById('fLocation').value;
        const location = locDropdown === 'Custom'
            ? (document.getElementById('fLocationCustom')?.value.trim() || '')
            : locDropdown;
        
        return {
            name, category, expiryDate: expDate,
            quantity: document.getElementById('fQty').value || '',
            location,
            barcode: document.getElementById('fBarcode').value.trim() || '',
            checkedBy: document.getElementById('fCheckedBy').value.trim() || '',
            notes: document.getElementById('fNotes').value.trim() || '',
            branchId: document.getElementById('fBranch')?.value || STATE.currentBranch || STATE.branches[0]?.id,
            assignedTo: document.getElementById('fAssignedTo')?.value || 'all' // Default to 'all' if not specified

    /**
     * Load users into assignment dropdown (admin only)
     */
    async function loadUsersForAssignment(currentAssignedTo) {
        const dropdown = document.getElementById('fAssignedTo');
        if (!dropdown || !STATE.isAdmin) return;
        
        try {
            const usersData = await dbGet('users');
            if (!usersData) {
                dropdown.innerHTML = `
                    <option value="all" selected>📢 All Users (Everyone can see)</option>
                    <option value="">🔒 No Assignment (Admin only)</option>`;
                return;
            }
            
            const users = Object.entries(usersData)
                .map(([uid, data]) => ({ uid, ...data }))
                .filter(u => u.email && u.email !== STATE.user.email) // Exclude current admin
                .sort((a, b) => (a.email || '').localeCompare(b.email || ''));
            
            let html = `
                <option value="all" ${currentAssignedTo === 'all' || !currentAssignedTo ? 'selected' : ''}>📢 All Users (Everyone can see)</option>
                <option value="" ${currentAssignedTo === '' ? 'selected' : ''}>🔒 No Assignment (Admin only)</option>`;
            
            if (users.length > 0) {
                html += `<option disabled>──────────────</option>`;
                users.forEach(user => {
                    const isSelected = currentAssignedTo === user.uid;
                    const label = user.email + (user.role === 'admin' ? ' (Admin)' : '');
                    html += `<option value="${user.uid}" ${isSelected ? 'selected' : ''}>👤 ${escHtml(label)}</option>`;
                });
            }
            
            dropdown.innerHTML = html;
        } catch(e) {
            console.error('Error loading users:', e);
            dropdown.innerHTML = `
                <option value="all" selected>📢 All Users (Everyone can see)</option>
                <option value="">🔒 No Assignment (Admin only)</option>`;
        }
    }

    /**
     * Archive an item (move to archive, can be restored)
     */
    async function archiveItem(id, name) {
        try {
            const item = STATE.items.find(i => i.id === id);
            if (!item) {
                showAlert('danger', '❌ Item not found');
                return;
            }
            
            // Add archive metadata
            const archivedItem = {
                ...item,
                archived: true,
                archivedAt: new Date().toISOString(),
                archivedBy: STATE.user.email
            };
            
            // Move to archive collection
            await dbSet('archive/' + id, archivedItem);
            
            // Remove from items
            await dbDelete('items/' + id);
            
            showAlert('success', `📦 "${name}" archived. View in Archive section to restore.`);
            fetchItems();
        } catch(err) {
            showAlert('danger', '❌ Archive failed: ' + (err.message || 'Unknown error'));
        }
    }
    
    /**
     * Permanent delete (cannot be recovered)
     */
    function permanentDeleteItem(id, name) {
        if (!confirm(`⚠️ PERMANENT DELETE\n\nAre you absolutely sure you want to permanently delete "${name}"?\n\nThis CANNOT be undone and the item will be lost forever.`)) {
            return;
        }
        
        dbDelete('items/' + id)
            .then(() => { 
                showAlert('success', '✅ Item permanently deleted.'); 
                fetchItems(); 
            })
            .catch(err => showAlert('danger', '❌ Error: ' + (err.message || 'Delete failed')));
    }

    /**
     * Load archived items from Firebase
     */
    async function loadArchivedItems() {
        try {
            const archiveData = await dbGet('archive');
            const loadingDiv = document.getElementById('archiveLoading');
            const contentDiv = document.getElementById('archiveContent');
            const emptyDiv = document.getElementById('archiveEmpty');
            
            if (loadingDiv) loadingDiv.style.display = 'none';
            
            if (!archiveData || Object.keys(archiveData).length === 0) {
                if (emptyDiv) emptyDiv.style.display = 'block';
                return;
            }
            
            // Convert to array and sort by archived date
            const archivedItems = Object.entries(archiveData)
                .map(([id, item]) => ({ id, ...item }))
                .sort((a, b) => new Date(b.archivedAt) - new Date(a.archivedAt));
            
            // Filter by current branch if not admin
            const filtered = STATE.isAdmin 
                ? archivedItems
                : archivedItems.filter(item => 
                    item.branchId === STATE.currentBranch || !item.branchId
                );
            
            if (filtered.length === 0) {
                if (emptyDiv) emptyDiv.style.display = 'block';
                return;
            }
            
            // Store for filtering
            window.ARCHIVE_ITEMS = filtered;
            
            // Show stats
            const statsDiv = document.getElementById('archiveStats');
            if (statsDiv) {
                statsDiv.innerHTML = `
                    <strong>📊 Archive Statistics:</strong> 
                    ${filtered.length} archived item${filtered.length !== 1 ? 's' : ''} • 
                    Oldest: ${formatDate(filtered[filtered.length - 1].archivedAt)} • 
                    Newest: ${formatDate(filtered[0].archivedAt)}
                `;
            }
            
            // Render table
            renderArchiveTable(filtered);
            
            if (contentDiv) contentDiv.style.display = 'block';
            
        } catch(e) {
            console.error('Error loading archive:', e);
            const loadingDiv = document.getElementById('archiveLoading');
            if (loadingDiv) {
                loadingDiv.innerHTML = `
                    <div style="color:#ef4444;">
                        <div style="font-size:32px;margin-bottom:10px;">❌</div>
                        <div>Error loading archive: ${escHtml(e.message)}</div>
                    </div>`;
            }
        }
    }
    
    /**
     * Render archive table
     */
    function renderArchiveTable(items) {
        const tbody = document.getElementById('archiveTableBody');
        if (!tbody) return;
        
        tbody.innerHTML = items.map(item => {
            const daysExpired = Math.floor((new Date() - new Date(item.expiryDate)) / (1000 * 60 * 60 * 24));
            const expiredLabel = daysExpired > 0 ? ` (${daysExpired} days ago)` : '';
            
            return `
                <tr>
                    <td><strong>${escHtml(item.name)}</strong></td>
                    <td>${escHtml(item.category)}</td>
                    <td>${formatDate(item.expiryDate)}${expiredLabel}</td>
                    <td>${formatDate(item.archivedAt)}</td>
                    <td>${escHtml(item.archivedBy || '—')}</td>
                    <td style="white-space:nowrap;">
                        <button class="btn btn-success btn-xs" onclick="restoreFromArchive('${item.id}', '${escHtml(item.name).replace(/'/g, "\\'")}')">♻️ Restore</button>
                        <button class="btn btn-danger btn-xs" onclick="permanentDeleteFromArchive('${item.id}', '${escHtml(item.name).replace(/'/g, "\\'")}')">🗑️ Delete</button>
                    </td>
                </tr>
            `;
        }).join('');
    }
    
    /**
     * Filter archive items
     */
    function filterArchive(searchTerm) {
        if (!window.ARCHIVE_ITEMS) return;
        
        const filtered = searchTerm
            ? window.ARCHIVE_ITEMS.filter(item =>
                item.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.category.toLowerCase().includes(searchTerm.toLowerCase()) ||
                (item.archivedBy && item.archivedBy.toLowerCase().includes(searchTerm.toLowerCase()))
            )
            : window.ARCHIVE_ITEMS;
        
        renderArchiveTable(filtered);
    }
    
    /**
     * Restore item from archive back to inventory
     */
    async function restoreFromArchive(id, name) {
        if (!confirm(`♻️ Restore "${name}" to inventory?`)) return;
        
        try {
            const archived = await dbGet('archive/' + id);
            if (!archived) {
                showAlert('danger', '❌ Archived item not found');
                return;
            }
            
            // Remove archive metadata
            const { archived: isArchived, archivedAt, archivedBy, ...restoredItem } = archived;
            
            // Add restore metadata
            restoredItem.restoredAt = new Date().toISOString();
            restoredItem.restoredBy = STATE.user.email;
            
            // Move back to items

    /**
     * Execute auto-archive
     */
    async function executeAutoArchive() {
        const days = parseInt(document.getElementById('archiveDays').value) || 30;
        const cutoffDate = new Date();
        cutoffDate.setDate(cutoffDate.getDate() - days);
        
        const eligible = STATE.items.filter(item => 
            new Date(item.expiryDate) < cutoffDate
        );
        
        if (eligible.length === 0) {
            showAlert('info', 'ℹ️ No items to archive');
            return;
        }
        
        if (!confirm(`Archive ${eligible.length} item${eligible.length !== 1 ? 's' : ''}?\n\nItems expired before ${formatDate(cutoffDate.toISOString())} will be moved to archive.`)) {
            return;
        }
        
        const btn = event.target;
        btn.textContent = '⏳ Archiving...';
        btn.disabled = true;
        
        let archived = 0;
        let failed = 0;
        
        for (const item of eligible) {
            try {
                // Add archive metadata
                const archivedItem = {
                    ...item,
                    archived: true,
                    archivedAt: new Date().toISOString(),
                    archivedBy: STATE.user.email,
                    autoArchived: true,
                    autoArchiveDays: days
                };
                
                // Move to archive
                await dbSet('archive/' + item.id, archivedItem);
                await dbDelete('items/' + item.id);
                archived++;
            } catch(e) {
                console.error('Failed to archive', item.id, e);
                failed++;
            }
        }
        
        closeModal();
        
        if (failed === 0) {
            showAlert('success', `✅ ${archived} item${archived !== 1 ? 's' : ''} archived successfully!`);
        } else {
            showAlert('warning', `⚠️ Archived: ${archived}, Failed: ${failed}`);
        }
        
        fetchItems();
    }

    // ===================== BARCODE SCANNER =====================
    
    // Barcode scanner state
    const BARCODE_SCANNER = {
        isScanning: false,
        stream: null,
        videoElement: null,
        canvasElement: null,
        detectInterval: null,
        keyboardBuffer: '',
        keyboardTimer: null,
        lastScanTime: 0,
        scanCooldown: 1000 // 1 second between scans
    };
    
    /**
     * Initialize barcode scanning with keyboard scanner support
     * USB barcode scanners typically act as keyboard input
     */
    function initKeyboardScanner() {
        document.addEventListener('keydown', handleKeyboardScan);
        console.log('✅ Keyboard barcode scanner initialized');
    }
    
    /**
     * Handle keyboard input from USB barcode scanners
     * Most USB scanners send: barcode + Enter key
     */
    function handleKeyboardScan(event) {
        // Only process if in a barcode input field or modal is open
        const isBarcodeField = event.target.id === 'fBarcode';
        const isModalOpen = document.querySelector('.modal.show');
        
        if (!isBarcodeField && !isModalOpen) return;
        
        // Clear timeout on any key press
        if (BARCODE_SCANNER.keyboardTimer) {
            clearTimeout(BARCODE_SCANNER.keyboardTimer);
        }
        
        // Check for Enter key (scanner finished)
        if (event.key === 'Enter' && BARCODE_SCANNER.keyboardBuffer.length > 0) {
            event.preventDefault();
            const barcode = BARCODE_SCANNER.keyboardBuffer;
            BARCODE_SCANNER.keyboardBuffer = '';
            handleBarcodeDetected(barcode, 'keyboard');
            return;
        }
        
        // Add character to buffer (ignore special keys)
        if (event.key.length === 1 && !event.ctrlKey && !event.altKey && !event.metaKey) {
            BARCODE_SCANNER.keyboardBuffer += event.key;
            
            // Auto-clear buffer after 100ms of no input (scanner types fast)
            BARCODE_SCANNER.keyboardTimer = setTimeout(() => {
                BARCODE_SCANNER.keyboardBuffer = '';
            }, 100);
        }
    }
    
    /**
     * Check camera permissions before showing scanner
     */
    async function checkCameraPermissions() {
        // Check if browser supports camera at all
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            return {
                supported: false,
                error: 'Camera API not supported in this browser. Please use Chrome, Safari, or Edge.'
            };
        }
        
        // Check if we're on HTTPS (required for camera on mobile)
        const isSecure = window.location.protocol === 'https:' || 
                        window.location.hostname === 'localhost' || 
                        window.location.hostname === '127.0.0.1';
        
        if (!isSecure) {
            return {
                supported: false,
                error: 'Camera requires HTTPS connection. Please access BEEP via https:// URL (not http://)'
            };
        }
        
        // Try to check permission status (if supported)
        if (navigator.permissions && navigator.permissions.query) {
            try {
                const permissionStatus = await navigator.permissions.query({ name: 'camera' });
                return {
                    supported: true,
                    status: permissionStatus.state, // 'granted', 'denied', or 'prompt'
                    permissionAPI: true
                };
            } catch(e) {
                // Permission API not fully supported, that's okay
                return {
                    supported: true,
                    status: 'unknown',
                    permissionAPI: false
                };
            }
        }
        
        return {
            supported: true,
            status: 'unknown',
            permissionAPI: false
        };
    }
    
    /**
     * Show barcode scanner modal with camera - with permission check
     */
    async function showBarcodeScanner() {
        // First, check camera permissions
        const permissionCheck = await checkCameraPermissions();
        
        if (!permissionCheck.supported) {
            // Camera not supported
            showCameraNotSupportedError(permissionCheck.error);
            return;
        }
        
        // If permission already denied, show help immediately
        if (permissionCheck.status === 'denied') {
            showCameraPermissionDeniedError();
            return;
        }
        
        // If permission already granted, skip prompt and go straight to scanner
        if (permissionCheck.status === 'granted') {
            showScanningModal();
            try {
                await startBarcodeCamera();
            } catch(e) {
                closeModal();
                handleCameraError(e);
            }
            return;
        }
        
        // Otherwise, show permission prompt
        showCameraPermissionPrompt();
    }

    /**
     * Start camera for barcode scanning
     */
    async function startBarcodeCamera() {
        try {
            const video = document.getElementById('barcodeScannerVideo');
            const canvas = document.getElementById('barcodeScannerCanvas');
            
            if (!video || !canvas) return;
            
            // Request camera access (prefer back camera on mobile)
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'environment', // Back camera on mobile
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            });
            
            video.srcObject = stream;
            BARCODE_SCANNER.stream = stream;
            BARCODE_SCANNER.videoElement = video;
            BARCODE_SCANNER.canvasElement = canvas;
            BARCODE_SCANNER.isScanning = true;
            
            // Wait for video to be ready
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // Hide loading indicator, show camera view
                const loadingIndicator = document.getElementById('cameraLoadingIndicator');
                const scannerContainer = document.getElementById('barcodeScannerContainer');
                const scanningTips = document.getElementById('scanningTips');
                
                if (loadingIndicator) loadingIndicator.style.display = 'none';
                if (scannerContainer) scannerContainer.style.display = 'block';
                if (scanningTips) scanningTips.style.display = 'block';
                
                // Start detection
                startBarcodeDetection();
                
                // Show success message briefly
                showAlert('success', '✅ Camera ready! Point at barcode to scan');
            };
            
        } catch(e) {
            console.error('Camera error:', e);
            throw e; // Let caller handle the error
        }
    }
    
    /**
     * Start detecting barcodes from video stream
     * Uses native BarcodeDetector API if available, otherwise ZXing library
     */
    async function startBarcodeDetection() {
        const video = BARCODE_SCANNER.videoElement;
        const canvas = BARCODE_SCANNER.canvasElement;
        
        // Try native BarcodeDetector API first (better performance on mobile)
        if ('BarcodeDetector' in window) {
            console.log('✅ Using native BarcodeDetector API');
            startNativeBarcodeDetection(video);
        } else {
            console.log('⚠️ Native BarcodeDetector not available, using ZXing library');
            startZXingBarcodeDetection(video, canvas);
        }
    }
    
    /**
     * Use native BarcodeDetector API (Chrome/Edge on Android)
     */
    async function startNativeBarcodeDetection(video) {
        try {
            const barcodeDetector = new BarcodeDetector({
                formats: [
                    'ean_13', 'ean_8', 'upc_a', 'upc_e',
                    'code_128', 'code_39', 'code_93',
                    'qr_code', 'data_matrix', 'pdf417'
                ]
            });
            
            console.log('✅ Native BarcodeDetector initialized');
            
            let frameCount = 0;
            BARCODE_SCANNER.detectInterval = setInterval(async () => {
                if (!BARCODE_SCANNER.isScanning || !video || video.readyState !== video.HAVE_ENOUGH_DATA) {
                    return;
                }
                
                frameCount++;
                
                try {
                    const barcodes = await barcodeDetector.detect(video);
                    
                    if (barcodes.length > 0) {
                        const barcode = barcodes[0];
                        console.log('✅ Barcode detected (native):', barcode.rawValue);
                        handleBarcodeDetected(barcode.rawValue, 'camera');
                    } else {
                        // Log progress every 5 seconds
                        if (frameCount % 25 === 0) {
                            console.log('Scanning... frame', frameCount, '(no barcode detected yet)');
                        }
                    }
                } catch(e) {
                    console.error('Detection error:', e);
                }
            }, 200); // Scan every 200ms (5 FPS)
            
        } catch(e) {
            console.error('Failed to initialize native detector:', e);
            // Fall back to ZXing
            startZXingBarcodeDetection(video, BARCODE_SCANNER.canvasElement);
        }
    }
    
    /**
     * Use ZXing library for barcode detection (fallback)
     */
    async function startZXingBarcodeDetection(video, canvas) {
        const ctx = canvas.getContext('2d');
        
        // Load ZXing library dynamically
        if (!window.ZXing) {
            try {
                await loadZXingLibrary();
            } catch(e) {
                console.error('Failed to load ZXing:', e);
                showAlert('danger', '❌ Barcode library failed to load. Please check internet connection.');
                return;
            }
        }
        
        try {
            // Initialize ZXing barcode reader with hints
            const codeReader = new ZXing.BrowserMultiFormatReader();
            
            // Add hints for better detection
            const hints = new Map();
            const formats = [
                ZXing.BarcodeFormat.EAN_13,
                ZXing.BarcodeFormat.EAN_8,
                ZXing.BarcodeFormat.UPC_A,
                ZXing.BarcodeFormat.UPC_E,
                ZXing.BarcodeFormat.CODE_128,
                ZXing.BarcodeFormat.CODE_39,
                ZXing.BarcodeFormat.QR_CODE
            ];
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
            hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
            
            console.log('✅ Starting ZXing barcode detection...');
            
            // Detect barcodes continuously
            let frameCount = 0;
            BARCODE_SCANNER.detectInterval = setInterval(async () => {
                if (!BARCODE_SCANNER.isScanning || !video || video.readyState !== video.HAVE_ENOUGH_DATA) {
                    return;
                }
                
                frameCount++;
                
                try {
                    // Draw current video frame to canvas
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Try to decode barcode from canvas
                    const result = await codeReader.decodeFromCanvas(canvas);
                    
                    if (result && result.text) {
                        console.log('✅ Barcode detected (ZXing):', result.text);
                        handleBarcodeDetected(result.text, 'camera');
                    }
                } catch(e) {
                    // No barcode found in this frame (expected, keep trying)
                    // Log every 25 frames (5 seconds) for debugging
                    if (frameCount % 25 === 0) {
                        console.log('Scanning... frame', frameCount, '(no barcode yet)');
                    }
                }
            }, 200); // Check every 200ms (5 FPS)
        } catch(e) {
            console.error('Failed to initialize ZXing:', e);
            showAlert('danger', '❌ Barcode scanner initialization failed. Library may not be loaded.');
        }
    }
    
    /**
     * Load ZXing barcode library
     */
    async function loadZXingLibrary() {
        return new Promise((resolve, reject) => {
            if (window.ZXing) {
                console.log('✅ ZXing already loaded');
                resolve();
                return;
            }
            
            console.log('📦 Loading ZXing library...');
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/@zxing/library@latest/umd/index.min.js';
            script.onload = () => {
                console.log('✅ ZXing library loaded successfully');
                // Wait a bit for library to initialize
                setTimeout(resolve, 100);
            };
            script.onerror = () => {
                console.error('❌ Failed to load ZXing library from CDN');
                reject(new Error('Failed to load barcode scanner library. Please check internet connection.'));
            };
            document.head.appendChild(script);
        });
    }
    
    /**
     * Handle barcode detection
     */
    function handleBarcodeDetected(barcode, source) {
        // Cooldown to prevent duplicate scans
        const now = Date.now();
        if (now - BARCODE_SCANNER.lastScanTime < BARCODE_SCANNER.scanCooldown) {
            return;
        }
        BARCODE_SCANNER.lastScanTime = now;
        
        console.log('📷 Barcode detected:', barcode, 'Source:', source);
        
        // If camera scanner modal is open, show result
        const resultDiv = document.getElementById('barcodeScanResult');
        const detectedDiv = document.getElementById('detectedBarcode');
        const useBtn = document.getElementById('useBarcodeBtn');
        
        if (resultDiv && detectedDiv && useBtn) {
            // Stop scanning
            stopBarcodeDetection();
            
            // Show result
            detectedDiv.textContent = barcode;
            resultDiv.style.display = 'block';
            useBtn.style.display = 'inline-block';
            
            // Store barcode temporarily
            window._scannedBarcode = barcode;
            
            // Play success sound (optional)
            playBeep();
        } else {
            // Direct input to barcode field (keyboard scanner)
            const barcodeInput = document.getElementById('fBarcode');
            if (barcodeInput) {
                barcodeInput.value = barcode;
                barcodeInput.focus();
                
                // Highlight the field
                barcodeInput.style.background = '#d1fae5';
                setTimeout(() => {
                    barcodeInput.style.background = '';
                }, 1000);
                
                showAlert('success', `✅ Barcode scanned: ${barcode}`);
                playBeep();
            }
        }
    }
    
    /**
     * Use the scanned barcode
     */
    function useScannedrBarcode() {
        const barcode = window._scannedBarcode;
        if (!barcode) return;
        
        // Fill the barcode field
        const barcodeInput = document.getElementById('fBarcode');
        if (barcodeInput) {
            barcodeInput.value = barcode;
        }
        
        // Close scanner
        stopBarcodeScanner();
        closeModal();
        
        showAlert('success', '✅ Barcode added to form');
    }
    
    /**
     * Stop barcode detection
     */
    function stopBarcodeDetection() {
        if (BARCODE_SCANNER.detectInterval) {
            clearInterval(BARCODE_SCANNER.detectInterval);
            BARCODE_SCANNER.detectInterval = null;
        }
        BARCODE_SCANNER.isScanning = false;
    }
    
    /**
     * Stop barcode scanner and release camera
     */
    function stopBarcodeScanner() {
        // Stop detection
        stopBarcodeDetection();
        
        // Release camera
        if (BARCODE_SCANNER.stream) {
            BARCODE_SCANNER.stream.getTracks().forEach(track => track.stop());
            BARCODE_SCANNER.stream = null;
        }
        
        // Clear references
        BARCODE_SCANNER.videoElement = null;
        BARCODE_SCANNER.canvasElement = null;
        window._scannedBarcode = null;
        
        console.log('📷 Barcode scanner stopped');
    }
    
    /**
     * Play beep sound on successful scan
     */
    function playBeep() {
        try {
            // Create audio context
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800; // 800Hz beep
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        } catch(e) {
            // Silent fail if audio not supported
        }
    }

    let importData = [];
    async function previewImport() {
        const file = document.getElementById('importFile').files[0];
        if (!file) { showAlert('warning', '⚠️ Please select a file first.'); return; }
        await loadXLSX();
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(ws, { raw: false });
                if (!json.length) { document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger show">❌ No data found in file.</div>'; return; }
                importData = json.map(row => ({
                    name: row.name || row.Name || row.NAME || '',
                    category: row.category || row.Category || CATEGORIES[0],
                    expiryDate: formatImportDate(row.expiryDate || row['Expiry Date'] || row.expiry || ''),
                    quantity: row.quantity || row.Quantity || '',
                    location: row.location || row.Location || '',
                    barcode: row.barcode || row.Barcode || row['Barcode / SKU'] || '',
                    checkedBy: row.checkedBy || row['Checked By'] || '',
                    notes: row.notes || row.Notes || ''
                })).filter(r => r.name && r.expiryDate);
                const preview = document.getElementById('importPreview');
                preview.innerHTML = `
                    <div class="success-box">✅ Found <strong>${importData.length}</strong> valid rows ready to import</div>
                    <div class="table-wrapper" style="height:200px;">
                        <table>
                            <thead><tr><th>Name</th><th>Category</th><th>Expiry</th><th>Qty</th><th>Location</th></tr></thead>
                            <tbody>${importData.slice(0,10).map(r=>`<tr><td>${escHtml(r.name)}</td><td>${escHtml(r.category)}</td><td>${r.expiryDate}</td><td>${escHtml(String(r.quantity))}</td><td>${escHtml(r.location)}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                    ${importData.length > 10 ? `<p style="text-align:center;color:#6b7280;font-size:13px;margin-top:8px;">...and ${importData.length-10} more rows</p>` : ''}`;
                document.getElementById('importBtn').disabled = false;
            } catch(err) {
                document.getElementById('importAlert').innerHTML = `<div class="alert alert-danger show">❌ Error reading file: ${err.message}</div>`;
            }
        };
        reader.readAsBinaryString(file);
    }

    function formatImportDate(val) {
        if (!val) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
        const d = new Date(val);
        if (!isNaN(d)) return d.toISOString().split('T')[0];
        return '';
    }

    async function doImport() {
        if (!importData.length) return;
        const btn = document.getElementById('importBtn');
        btn.textContent = '⏳ Importing...'; btn.disabled = true;
        let success = 0, failed = 0;
        const uid = STATE.user.localId || STATE.user.uid;
        for (const item of importData) {
            try {
                await dbPush('items', { ...item, userId: uid, userEmail: STATE.user.email, createdAt: new Date().toISOString() });
                success++;
            } catch(e) { failed++; }
        }
        closeModal();
        showAlert('success', `✅ Import complete! ${success} added${failed ? ', ' + failed + ' failed' : ''}.`);
        fetchItems();
    }

    // ===================== EXPORT =====================
    async function exportExcel() {
        if (!STATE.filtered.length) { showAlert('warning', '⚠️ No data to export.'); return; }
        showAlert('info', '⏳ Preparing Excel export...');
        await loadXLSX();
        const data = STATE.filtered.map((item, i) => ({
            '#': i+1,
            'Name': item.name || '',
            'Category': item.category || '',
            'Location': item.location || '',
            'Expiry Date': item.expiryDate || '',
            'Days Left': getDaysLeft(item.expiryDate),
            'Status': getStatus(item.expiryDate).toUpperCase(),
            'Quantity': item.quantity || '',
            'Barcode': item.barcode || '',
            'Checked By': item.checkedBy || '',
            'Checked At': item.checkedAt ? formatDate(item.checkedAt) : '',
            'Notes': item.notes || ''
        }));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, 'Inventory');
        XLSX.writeFile(wb, `BEEP_Export_${todayISO()}.xlsx`);
        showAlert('success', '✅ Excel exported successfully!');
    }

    async function exportPDF() {
        if (!STATE.filtered.length) { showAlert('warning', '⚠️ No data to export.'); return; }
        showAlert('info', '⏳ Preparing PDF export...');
        await loadJsPDF();
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        doc.setFontSize(16);
        doc.setTextColor(16, 185, 129);
        doc.text('🔔 BEEP - Expiry Management Report', 14, 15);
        doc.setFontSize(10);
        doc.setTextColor(100, 100, 100);
        doc.text(`Generated: ${new Date().toLocaleString()} | Total: ${STATE.filtered.length} items`, 14, 22);
        const cols = ['#','Name','Category','Location','Expiry Date','Days Left','Status','Qty','Checked By','Notes'];
        const rows = STATE.filtered.map((item,i) => [
            i+1, item.name||'', item.category||'', item.location||'',
            formatDate(item.expiryDate), getDaysLeft(item.expiryDate),
            getStatus(item.expiryDate).toUpperCase(), item.quantity||'', item.checkedBy||'', item.notes||''
        ]);
        doc.autoTable({
            head: [cols], body: rows, startY: 28,
            styles: { fontSize: 9, cellPadding: 3 },
            headStyles: { fillColor: [16, 185, 129], textColor: 255, fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [245, 250, 246] },
            didParseCell: data => {
                if (data.section === 'body' && data.column.index === 6) {
                    const val = String(data.cell.raw);
                    if (val === 'CRITICAL') data.cell.styles.textColor = [220, 38, 38];
                    else if (val === 'WARNING') data.cell.styles.textColor = [217, 119, 6];
                    else data.cell.styles.textColor = [5, 150, 105];
                }
            }
        });
        doc.save(`BEEP_Report_${todayISO()}.pdf`);
        showAlert('success', '✅ PDF exported successfully!');
    }

    // ===================== DEVICE AUTHORIZATION =====================
    function getDeviceId() {
        try {
            let id = localStorage.getItem('beep_device_id');
            if (!id) {
                id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
                localStorage.setItem('beep_device_id', id);
            }
            return id;
        } catch(e) {
            if (!window._beepDeviceId) window._beepDeviceId = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
            return window._beepDeviceId;
        }
    }

    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let type = '🖥️';
        let browser = 'Unknown';
        let os = 'Unknown';
        if (/Android/i.test(ua)) { type = '📱'; os = 'Android'; }
        else if (/iPhone|iPad/i.test(ua)) { type = '📱'; os = 'iOS'; }
        else if (/Windows/i.test(ua)) { type = '💻'; os = 'Windows'; }
        else if (/Mac/i.test(ua)) { type = '💻'; os = 'macOS'; }
        else if (/Linux/i.test(ua)) { type = '🖥️'; os = 'Linux'; }
        if (/Chrome/i.test(ua) && !/Chromium|Edge/i.test(ua)) browser = 'Chrome';
        else if (/Firefox/i.test(ua)) browser = 'Firefox';
        else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
        else if (/Edge/i.test(ua)) browser = 'Edge';
        else if (/Samsung/i.test(ua)) browser = 'Samsung Browser';
        const screen = `${window.screen.width}×${window.screen.height}`;
        return { type, browser, os, screen, userAgent: ua.slice(0,120) };
    }

    async function registerDevice() {
        const uid = STATE.user.localId || STATE.user.uid;
        const devId = getDeviceId();
        STATE.deviceId = devId;
        const info = getDeviceInfo();
        const deviceData = {
            deviceId: devId,
            userId: uid,
            userEmail: STATE.user.email,
            displayName: STATE.userProfile?.displayName || STATE.user.email.split('@')[0],
            type: info.type,
            browser: info.browser,
            os: info.os,
            screen: info.screen,
            lastSeen: new Date().toISOString(),
            firstSeen: new Date().toISOString(),
            status: 'active'
        };
        try {
            // Check if device already registered
            const existing = await dbGet('devices/' + devId);
            if (existing) {
                // Update lastSeen
                await dbUpdate('devices/' + devId, {
                    lastSeen: new Date().toISOString(),
                    userId: uid,
                    userEmail: STATE.user.email
                });
                // Check if this device is blocked
                if (existing.status === 'blocked') {
                    const adminBlock = STATE.appSettings?.deviceAuth?.enforceBlock !== false;
                    if (adminBlock && !STATE.isAdmin) {
                        logout(true); // forced logout - no confirm dialog
                        return;
                    }
                }
            } else {
                // New device
                const requireApproval = STATE.appSettings?.deviceAuth?.requireApproval && !STATE.isAdmin;
                deviceData.status = requireApproval ? 'pending' : 'active';
                await dbSet('devices/' + devId, deviceData);
                if (requireApproval) {
                    showAlert('warning', '⚠️ This device is pending admin approval. Some features may be restricted.');
                }
            }
        } catch(e) { console.warn('Device registration failed:', e); }
    }

    async function processSMSAlerts(isManual = false) {
        const settings = STATE.appSettings?.sms;
        if (!settings || !settings.recipients || settings.recipients.length === 0) {
            return { success: false, error: 'No recipients configured' };
        }
        
        // Collect items that need alerts
        const warning = settings.warningEnabled ? STATE.items.filter(i => getStatus(i.expiryDate) === 'warning') : [];
        const critical = settings.criticalEnabled ? STATE.items.filter(i => getStatus(i.expiryDate) === 'critical') : [];
        const expired = settings.expiredEnabled ? STATE.items.filter(i => getDaysLeft(i.expiryDate) < 0) : [];
        
        if (warning.length === 0 && critical.length === 0 && expired.length === 0) {
            return { success: true, sent: 0, message: 'No items require alerts' };
        }
        
        // Build message
        const message = buildSMSMessage(critical, warning, expired);
        
        // Send to all recipients
        let sent = 0;
        let failed = 0;
        for (const recipient of settings.recipients) {
            const result = await sendSMS(recipient, message, settings);
            if (result.success) sent++;
            else failed++;
        }
        
        // Update last sent timestamp
        if (sent > 0) {
            await dbUpdate('appSettings/sms', { lastSent: new Date().toISOString() });
        }
        
        return { success: sent > 0, sent, failed };
    }

    function buildSMSMessage(critical, warning, expired) {
        const lines = [];
        lines.push('🔔 BEEP Expiry Alert');
        lines.push(`📅 ${new Date().toLocaleDateString()}`);
        lines.push('─'.repeat(28));
        
        if (expired.length > 0) {
            lines.push(`⚫ ${expired.length} EXPIRED item${expired.length!==1?'s':''}`);
            expired.slice(0, 3).forEach(item => {
                lines.push(`  • ${item.name} (${Math.abs(getDaysLeft(item.expiryDate))}d ago)`);
            });
            if (expired.length > 3) lines.push(`  ...and ${expired.length - 3} more`);
        }
        
        if (critical.length > 0) {
            lines.push(`🔴 ${critical.length} CRITICAL (≤7 days)`);
            critical.slice(0, 3).forEach(item => {
                lines.push(`  • ${item.name} (${getDaysLeft(item.expiryDate)}d left)`);
            });
            if (critical.length > 3) lines.push(`  ...and ${critical.length - 3} more`);
        }
        
        if (warning.length > 0) {
            lines.push(`🟡 ${warning.length} WARNING (≤30 days)`);
            warning.slice(0, 2).forEach(item => {
                lines.push(`  • ${item.name} (${getDaysLeft(item.expiryDate)}d left)`);
            });
            if (warning.length > 2) lines.push(`  ...and ${warning.length - 2} more`);
        }
        
        lines.push('─'.repeat(28));
        lines.push('Check BEEP for full details');
        
        return lines.join('\n');
    }

    async function sendSMS(to, message, settings) {
        try {
            if (settings.provider === 'twilio') {
                return await sendViaTwilio(to, message, settings);
            } else if (settings.provider === 'messagebird') {
                return await sendViaMessageBird(to, message, settings);
            } else if (settings.provider === 'custom') {
                return { success: false, error: 'Custom API not yet implemented - please use Twilio or MessageBird' };
            } else {
                return { success: false, error: 'No SMS provider configured' };
            }
        } catch(e) {
            return { success: false, error: e.message || 'Unknown error' };
        }
    }

    async function sendViaTwilio(to, message, settings) {
        try {
            const url = `https://api.twilio.com/2010-04-01/Accounts/${settings.apiKey}/Messages.json`;
            const auth = btoa(`${settings.apiKey}:${settings.apiSecret}`);
            
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Basic ${auth}`,
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    From: settings.fromNumber,
                    To: to,
                    Body: message
                })
            });
            
            if (!res.ok) {
                const err = await res.json();
                return { success: false, error: err.message || 'Twilio API error' };
            }
            
            return { success: true };
        } catch(e) {
            return { success: false, error: e.message };
        }
    }

    async function sendViaMessageBird(to, message, settings) {
        try {
            const url = 'https://rest.messagebird.com/messages';
            
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `AccessKey ${settings.apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    originator: settings.fromNumber,
                    recipients: [to],
                    body: message
                })
            });
            
            if (!res.ok) {
                const err = await res.json();
                return { success: false, error: err.errors?.[0]?.description || 'MessageBird API error' };
            }
            
            return { success: true };
        } catch(e) {
            return { success: false, error: e.message };
        }
    }

    // Check if SMS alerts should be sent (called on app load)
    async function checkSMSAlertsSchedule() {
        if (!STATE.isAdmin) return; // Only admins trigger scheduled alerts
        
        const settings = STATE.appSettings?.sms;
        if (!settings || settings.frequency === 'manual') return;
        
        const now = new Date();
        const lastSent = settings.lastSent ? new Date(settings.lastSent) : null;
        
        // Check if it's time to send
        let shouldSend = false;
        
        if (settings.frequency === 'daily') {
            // Send if never sent, or if last sent was yesterday or earlier
            if (!lastSent || (now.getDate() !== lastSent.getDate() || now.getMonth() !== lastSent.getMonth())) {
                shouldSend = now.getHours() >= 8; // Send at or after 8 AM
            }
        } else if (settings.frequency === 'weekly') {
            // Send on Mondays
            if (now.getDay() === 1) { // Monday
                if (!lastSent || (now - lastSent > 6 * 24 * 60 * 60 * 1000)) {
                    shouldSend = now.getHours() >= 8;
                }
            }
        }
        
        if (shouldSend) {
            await processSMSAlerts(false);
        }
    }

    function promoteUser(uid) {
        const user = STATE.allUsers.find(u => u.id === uid);
        const userName = user?.displayName || user?.email || 'this user';
        
        if (!confirm(`🔐 Promote "${userName}" to Admin?\n\nAdmins can:\n✅ View all inventory\n✅ Manage users & devices\n✅ Access admin panel\n✅ Configure settings\n\nThis action takes effect immediately.`)) return;
        
        dbUpdate('users/' + uid, { 
            role: 'admin',
            promotedAt: new Date().toISOString(),
            promotedBy: STATE.user.email
        }).then(() => { 
            showAlert('success', `✅ ${userName} is now an Admin with full access!`); 
            loadAdminUsers(); 
        }).catch(err => {
            showAlert('danger', `❌ Failed to promote user: ${err.message}`);
        });
    }

    function demoteUser(uid) {
        const user = STATE.allUsers.find(u => u.id === uid);
        const userName = user?.displayName || user?.email || 'this user';
        const currentUid = STATE.user.localId || STATE.user.uid;
        
        // Prevent self-demotion
        if (uid === currentUid) {
            showAlert('warning', '⚠️ You cannot demote yourself! Ask another admin to demote you.');
            return;
        }
        
        if (!confirm(`⬇️ Demote "${userName}" to regular user?\n\nThey will lose:\n❌ Access to admin panel\n❌ Ability to view all inventory\n❌ Device & user management\n\nThis action takes effect immediately.`)) return;
        
        dbUpdate('users/' + uid, { 
            role: 'user',
            demotedAt: new Date().toISOString(),
            demotedBy: STATE.user.email
        }).then(() => { 
            showAlert('success', `✅ ${userName} demoted to regular user.`); 
            loadAdminUsers(); 
        }).catch(err => {
            showAlert('danger', `❌ Failed to demote user: ${err.message}`);
        });
    }

    function handlePhotoUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 500000) {
            showAlert('warning', '⚠️ Photo too large. Please use an image under 500KB.');
            return;
        }
        const reader = new FileReader();
        reader.onload = e => {
            const dataURL = e.target.result;
            // Update avatar preview
            const avatarEl = document.getElementById('profileAvatarImg');
            if (avatarEl) {
                avatarEl.outerHTML = `<img src="${dataURL}" class="profile-avatar" id="profileAvatarImg" onclick="document.getElementById('photoFileInput').click()" title="Click to change photo">`;
            }
            // Store in state & DB as base64
            STATE.userProfile.photoURL = dataURL;
            const uid = STATE.user.localId || STATE.user.uid;
            dbUpdate('users/' + uid, { photoURL: dataURL })
                .then(() => showAlert('success', '✅ Photo updated!'))
                .catch(() => showAlert('warning', '⚠️ Photo saved locally only.'));
        };
        reader.readAsDataURL(file);
    }

    function changePassword() {
        const pass = document.getElementById('newPass').value;
        const conf = document.getElementById('newPassConfirm')?.value || pass;
        const alertDiv = document.getElementById('profileAlert') || document.getElementById('settingsAlert');
        if (!pass || pass.length < 6) {
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-danger show">❌ Password must be at least 6 characters.</div>';
            return;
        }
        if (pass !== conf) {
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-danger show">❌ Passwords do not match.</div>';
            return;
        }
        fbChangePassword(STATE.user.idToken, pass)
            .then(data => {
                STATE.user.idToken = data.idToken;
                STATE.user.refreshToken = data.refreshToken;
                saveSession(STATE.user);
                if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-success show">✅ Password changed successfully!</div>';
                document.getElementById('newPass').value = '';
                if (document.getElementById('newPassConfirm')) document.getElementById('newPassConfirm').value = '';
            })
            .catch(err => {
                let msg = err.message || 'Failed to change password.';
                if (msg.includes('CREDENTIAL_TOO_OLD') || msg.includes('TOKEN_EXPIRED'))
                    msg = 'Session expired. Please sign out and sign back in, then try again.';
                if (alertDiv) alertDiv.innerHTML = `<div class="alert alert-danger show">❌ ${msg}</div>`;
            });
    }

    async function loadContacts() {
        try {
            const uid = STATE.user.localId || STATE.user.uid;
            const cached = cacheGet('contacts_' + uid, 10 * 60 * 1000);
            if (cached) { STATE.contacts = cached; }
            if (!IS_ONLINE) {
                STATE.contacts = cached || cacheGetStale('contacts_' + uid) || [];
                return;
            }
            const data = await dbGet('contacts/' + uid);
            STATE.contacts = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
            cacheSet('contacts_' + uid, STATE.contacts);
        } catch(e) {
            try { STATE.contacts = cacheGetStale('contacts_' + (STATE.user.localId||STATE.user.uid)) || []; } catch(_) { STATE.contacts = []; }
        }
    }

    async function sendToSelectedRecipients(message, title) {
        const selected = Array.from(document.querySelectorAll('.recipient-checkbox:checked'));
        
        if (selected.length === 0) {
            document.getElementById('recipientAlert').innerHTML = 
                '<div class="alert alert-warning show">⚠️ Please select at least one recipient</div>';
            return;
        }
        
        const recipients = selected.map(cb => ({
            name: cb.dataset.name,
            phone: cb.dataset.phone
        }));
        
        // Open WhatsApp for each recipient
        let sent = 0;
        for (const recipient of recipients) {
            const whatsappUrl = `https://wa.me/${recipient.phone.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            sent++;
            
            // Small delay between opens to avoid blocking
            if (sent < recipients.length) {
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }
        
        showAlert('success', `✅ Opened WhatsApp for ${sent} recipient${sent > 1 ? 's' : ''}!`);
        closeModal();
    }

    function getActiveFilters() {
        const filters = [];
        if (STATE.currentFilter !== 'all') {
            filters.push(`Status: ${STATE.currentFilter.charAt(0).toUpperCase() + STATE.currentFilter.slice(1)}`);
        }
        if (STATE.currentCategory) {
            filters.push(`Category: ${STATE.currentCategory}`);
        }
        if (STATE.currentCheckedBy) {
            filters.push(`Checked By: ${STATE.currentCheckedBy}`);
        }
        if (STATE.currentDatePreset && STATE.currentDatePreset !== 'custom') {
            const labels = {today:'Today',this_week:'This Week',next_7:'Next 7 Days',next_14:'Next 14 Days',next_30:'Next 30 Days',this_month:'This Month',next_month:'Next Month'};
            filters.push(`Expiry: ${labels[STATE.currentDatePreset]||STATE.currentDatePreset}`);
        } else if (STATE.currentDateFrom || STATE.currentDateTo) {
            if (STATE.currentDateFrom && STATE.currentDateTo) filters.push(`Expiry: ${STATE.currentDateFrom} to ${STATE.currentDateTo}`);
            else if (STATE.currentDateFrom) filters.push(`Expiry: From ${STATE.currentDateFrom}`);
            else if (STATE.currentDateTo) filters.push(`Expiry: Until ${STATE.currentDateTo}`);
        }
        if (STATE.currentSearch) {
            filters.push(`Search: "${STATE.currentSearch}"`);
        }
        return filters.length > 0 ? filters.join(' | ') : null;
    }

    function buildMessage(template) {
        const wa = STATE.appSettings?.wa || {};
        const today = new Date().toLocaleDateString('en-MY', {day:'2-digit',month:'short',year:'numeric'});
        const sender = wa.businessName || STATE.userProfile?.displayName || STATE.user?.email || 'BEEP User';
        const prefix = wa.msgPrefix ? wa.msgPrefix + '\n' : '';
        const footer = wa.msgFooter || '_Sent via BEEP Expiry Management_';
        
        // Determine which items to include
        let items;
        if (template === 'current') {
            // Share exactly what's visible on screen (respects all filters)
            items = [...STATE.filtered];
        } else {
            // Apply template filter on top of current STATE.filtered
            items = [...STATE.filtered];
            if (template === 'critical') items = items.filter(i => getStatus(i.expiryDate) === 'critical');
            else if (template === 'warning') items = items.filter(i => ['critical','warning'].includes(getStatus(i.expiryDate)));
        }
        
        // Cap at 20 items to keep message short
        const list = items.slice(0,20);
        const hasMore = items.length > 20;
        const statusIcon = s => s==='critical'?'🔴':s==='warning'?'🟡':'🟢';
        
        // Intro line based on template
        let introLine;
        if (template === 'current') {
            introLine = '🎯 Current filtered view:';
        } else if (template === 'critical') {
            introLine = wa.tplCritical || '⚠️ Items requiring *immediate action*:';
        } else if (template === 'warning') {
            introLine = wa.tplWarning || '📋 Items expiring within 30 days:';
        } else {
            introLine = '📦 Full inventory report:';
        }
        
        // Build item lines
        const lines = list.map((item,i) => {
            const days = getDaysLeft(item.expiryDate);
            const s = getStatus(item.expiryDate);
            const exp = days<0?`EXPIRED ${Math.abs(days)}d ago`:days===0?`Expires TODAY`:`${days} days left`;
            return `${i+1}. ${statusIcon(s)} *${item.name}*\n   📍 ${item.location||'—'} | ${exp}`;
        }).join('\n');
        
        // Stats (use STATE.items for full inventory, items for filtered count)
        const total = STATE.items.length;
        const critical = STATE.items.filter(i=>getStatus(i.expiryDate)==='critical').length;
        const warning  = STATE.items.filter(i=>getStatus(i.expiryDate)==='warning').length;
        const shownCount = items.length;
        
        // Active filters banner
        const activeFilters = getActiveFilters();
        const filterBanner = activeFilters ? `📊 *Active Filters:* ${activeFilters}\n${'─'.repeat(32)}\n` : '';
        
        return `${prefix}🔔 *BEEP Expiry Report*
📅 ${today} | From: ${sender}
${'─'.repeat(32)}
*Summary:* 🔴 ${critical} Critical | 🟡 ${warning} Warning | 📦 ${total} Total
${'─'.repeat(32)}
${filterBanner}${introLine}
${lines||'✅ No items match this filter.'}${hasMore?`\n\n...and ${items.length-20} more items`:''}
${'─'.repeat(32)}
*Showing:* ${shownCount} of ${total} total items
${'─'.repeat(32)}
${footer}`;
    }

    const selectedRecipients = new Set();

    function toggleRecipient(i, el) {
        if (selectedRecipients.has(i)) {
            selectedRecipients.delete(i);
            el.classList.remove('selected');
            document.getElementById('rc_check_'+i).style.display = 'none';
        } else {
            selectedRecipients.add(i);
            el.classList.add('selected');
            document.getElementById('rc_check_'+i).style.display = '';
        }
    }

    function selectAllRecipients(count) {
        for (let i=0;i<count;i++) {
            selectedRecipients.add(i);
            const el = document.getElementById('rc_'+i);
            const ch = document.getElementById('rc_check_'+i);
            if (el) el.classList.add('selected');
            if (ch) ch.style.display = '';
        }
    }

    function deselectAllRecipients(count) {
        selectedRecipients.clear();
        for (let i=0;i<count;i++) {
            const el = document.getElementById('rc_'+i);
            const ch = document.getElementById('rc_check_'+i);
            if (el) el.classList.remove('selected');
            if (ch) ch.style.display = 'none';
        }
    }

    function setTemplate(tpl, btn) {
        shareTemplate = tpl;
        document.querySelectorAll('.msg-template-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        refreshSharePreview();
    }

    function refreshSharePreview() {
        const el = document.getElementById('sharePreview');
        if (el) el.textContent = buildMessage(shareTemplate);
    }

    function doSendWhatsApp() {
        const contacts = STATE.contacts.filter(c=>c.name||c.phone);
        const msg = buildMessage(shareTemplate);
        const encoded = encodeURIComponent(msg);
        const alertDiv = document.getElementById('shareAlert');

        if (selectedRecipients.size === 0) {
            // No recipient selected — open generic WhatsApp with just the message
            window.open(`https://api.whatsapp.com/send?text=${encoded}`, '_blank');
            return;
        }

        let opened = 0;
        selectedRecipients.forEach(i => {
            const c = contacts[i];
            if (!c) return;
            // Sanitise phone: remove spaces, dashes, parentheses
            const phone = (c.phone||'').replace(/[\s\-().]/g,'');
            setTimeout(() => {
                window.open(`https://api.whatsapp.com/send?phone=${encodeURIComponent(phone)}&text=${encoded}`, '_blank');
            }, opened * 600); // stagger to avoid popup blockers
            opened++;
        });

        if (alertDiv) alertDiv.innerHTML = `<div class="alert alert-success show">📱 Opening WhatsApp for ${opened} recipient${opened!==1?'s':''}...</div>`;
        setTimeout(closeModal, 1800);
    }

    function doSendEmail() {
        const contacts = STATE.contacts.filter(c=>c.name||c.phone);
        const msg = buildMessage(shareTemplate);
        const alertDiv = document.getElementById('shareAlert');
        const today = new Date().toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'});
        const subject = encodeURIComponent(`BEEP Expiry Report — ${today}`);
        const body = encodeURIComponent(msg);

        if (selectedRecipients.size === 0) {
            // Open blank mailto
            window.open(`mailto:?subject=${subject}&body=${body}`, '_self');
            return;
        }

        const emails = [];
        selectedRecipients.forEach(i => {
            const c = contacts[i];
            if (!c) return;
            // Use phone field as email if it contains @, else skip
            const addr = (c.phone||'').includes('@') ? c.phone : '';
            if (addr) emails.push(addr);
        });

        if (emails.length === 0) {
            // No valid emails — open with pre-filled message, user adds address
            window.open(`mailto:?subject=${subject}&body=${body}`, '_self');
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-warning show">⚠️ No email addresses found. Opening email with message — add recipients manually.</div>';
            return;
        }

        window.open(`mailto:${emails.join(',')}?subject=${subject}&body=${body}`, '_self');
        if (alertDiv) alertDiv.innerHTML = `<div class="alert alert-success show">✉️ Opening email for ${emails.length} recipient${emails.length!==1?'s':''}...</div>`;
        setTimeout(closeModal, 1500);
    }

    // ===================== EMERGENCY ADMIN RESTORE =====================
    window.restoreAdmin = function() {
        if (!STATE.user) { console.error('Not logged in'); return; }
        const uid = STATE.user.localId || STATE.user.uid;
        dbUpdate('users/' + uid, { role: 'admin' }).then(() => {
            console.log('%c✅ Admin role restored. Please refresh the page.', 'color:#10b981;font-weight:bold;font-size:14px;');
            alert('✅ Admin role restored. The page will now reload.');
            location.reload();
        }).catch(err => console.error('❌ Error:', err));
    };

    // ===================== CLOSE MODAL ON BACKDROP CLICK =====================
    document.addEventListener('click', e => {
        if (e.target.classList.contains('modal')) closeModal();
    });

    // ===================== KEYBOARD SHORTCUTS =====================
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeModal(); closeFeaturesMenu(); closeProfileCard(); }
        if (e.ctrlKey && e.key === 'k') { e.preventDefault(); const sb = document.getElementById('searchBox'); if (sb) sb.focus(); }
    });

    // Detect non-http protocol and show warning
    if (!['http:', 'https:', 'chrome-extension:'].includes(location.protocol)) {
        const w = document.getElementById('protocolWarning');
        if (w) w.style.display = 'block';
        console.warn('⚠️ Running on protocol:', location.protocol, '— using REST API mode');
    }
    console.log('%c✅ BEEP REST Mode — works on any protocol!','color:#10b981;font-weight:bold;');</script>
