<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEEP - Battery Expiry Management</title>
    <meta name="application-name" content="BEEP">
    <meta name="description" content="Battery Expiry Monitoring & Alert System">
    <meta name="theme-color" content="#10b981">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2310b981'/><text x='50' y='70' text-anchor='middle' font-size='70' fill='white' font-family='Arial'>🔔</text></svg>">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- DNS preconnect for speed -->
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
    <link rel="preconnect" href="https://beep-app-4f046-default-rtdb.firebaseio.com">
    <link rel="preconnect" href="https://securetoken.googleapis.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <!-- Export Libraries — loaded lazily (only when needed) -->
    <script>
        // Lazy-load heavy export libs only when first needed
        let _xlsxLoaded=false, _jspdfLoaded=false;
        function loadXLSX() {
            return new Promise(res => {
                if(_xlsxLoaded||window.XLSX){_xlsxLoaded=true;res();return;}
                const s=document.createElement('script');
                s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
                s.onload=()=>{_xlsxLoaded=true;res();}; document.head.appendChild(s);
            });
        }
        function loadJsPDF() {
            return new Promise(res => {
                if(_jspdfLoaded||window.jspdf){_jspdfLoaded=true;res();return;}
                const s=document.createElement('script');
                s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                s.onload=()=>{
                    const s2=document.createElement('script');
                    s2.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js';
                    s2.onload=()=>{_jspdfLoaded=true;res();}; document.head.appendChild(s2);
                }; document.head.appendChild(s);
            });
        }
    </script>
    <style>
        :root { 
            --fs-scale: 1; 
            /* Light mode colors (default) */
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f9fafb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --border-color: #e5e7eb;
            --shadow: rgba(0,0,0,.1);
            --shadow-lg: rgba(0,0,0,.15);
            --input-bg: #ffffff;
            --card-bg: #ffffff;
        }
        
        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --bg-tertiary: #374151;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --text-tertiary: #9ca3af;
            --border-color: #374151;
            --shadow: rgba(0,0,0,.3);
            --shadow-lg: rgba(0,0,0,.5);
            --input-bg: #374151;
            --card-bg: #1f2937;
        }
        
        *{margin:0;padding:0;box-sizing:border-box;transition:background-color .2s ease,color .2s ease,border-color .2s ease;}
        html,body{overscroll-behavior-y:contain;touch-action:pan-y;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-primary);color:var(--text-primary);font-size:calc(18px * var(--fs-scale))}
        @keyframes glow{0%,100%{box-shadow:0 0 10px #10b981}50%{box-shadow:0 0 30px #10b981}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideDown{from{opacity:0;transform:translate(-50%,-100px)}to{opacity:1;transform:translate(-50%,0)}}
        @keyframes slideUp{from{opacity:1;transform:translate(-50%,0)}to{opacity:0;transform:translate(-50%,-100px)}}
        .refreshing{animation:spin 1s linear infinite}
        .pull-to-refresh{position:fixed;top:0;left:0;right:0;height:70px;background:linear-gradient(135deg,#10b981,#059669);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;transform:translateY(-100%);transition:transform .3s ease;z-index:9999}
        .pull-to-refresh.visible{transform:translateY(0)}
        .mega-badge{background:linear-gradient(135deg,#10b981,#059669);color:white;padding:14px 28px;border-radius:22px;font-size:19px;font-weight:900;display:inline-block;animation:pulse 2s infinite;text-transform:uppercase}
        .admin-badge{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;padding:6px 16px;border-radius:10px;font-size:14px;font-weight:800;animation:pulse 2s infinite}
        .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
        .auth-box{background:white;border-radius:24px;padding:50px;width:100%;max-width:600px;box-shadow:0 25px 70px rgba(0,0,0,.35)}
        .logo{text-align:center;margin-bottom:35px}
        .logo h1{font-size:44px;color:#2563eb;margin-bottom:12px;font-weight:900}
        .feature-box{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border:4px solid #3b82f6;border-radius:18px;padding:24px;margin:24px 0}
        .feature-box h3{color:#1e40af;margin-bottom:18px;text-align:center;font-size:22px;font-weight:800}
        .feature-item{background:white;padding:16px;margin:10px 0;border-radius:10px;border-left:5px solid #10b981;font-weight:700;font-size:17px}
        .form-group{margin-bottom:24px;position:relative;clear:both;width:100%}
        .form-group label{display:block;margin-bottom:10px;font-weight:700;font-size:18px;width:100%;color:var(--text-primary)}
        .form-control,select{width:100%;padding:16px 18px;border:3px solid #e5e7eb;border-radius:12px;font-size:18px;display:block;margin:0;font-weight:500}
        .form-control:focus,select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.15)}
        textarea.form-control{resize:vertical;min-height:120px;line-height:1.6}
        .btn{padding:16px 28px;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;width:100%;transition:all .2s;display:block;text-align:center;margin:12px 0}
        .btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.2)}
        .btn-primary{background:#2563eb;color:white}
        .btn-primary:hover{background:#1e40af}
        .btn-success{background:#10b981;color:white}
        .btn-success:hover{background:#059669}
        .btn-danger{background:#ef4444;color:white}
        .btn-danger:hover{background:#dc2626}
        .btn-warning{background:#f59e0b;color:white}
        .btn-warning:hover{background:#d97706}
        .btn-info{background:#06b6d4;color:white}
        .btn-info:hover{background:#0891b2}
        .btn-secondary{background:#6b7280;color:white}
        .btn-secondary:hover{background:#4b5563}
        .btn-purple{background:#8b5cf6;color:white}
        .btn-purple:hover{background:#7c3aed}
        .btn-whatsapp{background:#25D366;color:white}
        .btn-whatsapp:hover{background:#128C7E}
        .btn-sm{padding:11px 20px;font-size:16px;width:auto;font-weight:700}
        .btn-xs{padding:7px 14px;font-size:14px;width:auto;margin:0 3px;font-weight:700}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
        .auth-links{text-align:center;margin-top:24px;font-size:17px}
        .auth-links a{color:#2563eb;text-decoration:none;font-weight:700;cursor:pointer}
        .auth-links a:hover{text-decoration:underline}
        .alert{padding:16px;border-radius:10px;margin-bottom:24px;display:none;border-left:5px solid;animation:fadeIn .3s ease;font-size:17px;font-weight:600}
        .alert.show{display:block}
        .alert-success{background:#d1fae5;color:#065f46;border-left-color:#10b981}
        .alert-danger{background:#fee2e2;color:#991b1b;border-left-color:#ef4444}
        .alert-info{background:#dbeafe;color:#1e40af;border-left-color:#3b82f6}
        .alert-warning{background:#fef3c7;color:#92400e;border-left-color:#f59e0b}
        .header{background:var(--bg-secondary);padding:18px 24px;border-bottom:3px solid var(--border-color);position:sticky;top:0;z-index:100;box-shadow:0 3px 10px var(--shadow)}
        .header-content{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
        .header-logo{font-size:28px;font-weight:900;color:#2563eb;display:flex;align-items:center;gap:12px}
        .header-user{font-size:16px;color:var(--text-secondary);display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-weight:600}
        .container{padding:24px;max-width:1600px;margin:0 auto}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:30px}
        .stat-card{background:var(--card-bg);padding:26px;border-radius:14px;border-left:5px solid;box-shadow:0 2px 6px var(--shadow);cursor:pointer;transition:transform .2s}
        .stat-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px var(--shadow)}
        .stat-card.critical{border-left-color:#ef4444}
        .stat-card.warning{border-left-color:#f59e0b}
        .stat-card.safe{border-left-color:#10b981}
        .stat-card.all{border-left-color:var(--text-secondary)}
        .stat-card.active{box-shadow:0 0 0 4px #2563eb}
        .stat-value{font-size:42px;font-weight:900;margin:10px 0}
        .stat-label{font-size:16px;color:var(--text-secondary);font-weight:700}
        .actions{background:var(--card-bg);padding:20px;border-radius:14px;margin-bottom:24px;box-shadow:0 2px 6px var(--shadow)}
        .action-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
        .action-row:last-child{margin-bottom:0}
        .search-box{flex:1;min-width:240px;padding:14px 18px;border:3px solid var(--border-color);border-radius:12px;font-size:17px;background:var(--input-bg);color:var(--text-primary);font-weight:500}
        .search-box:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
        .filter-select{padding:14px 18px;border:3px solid var(--border-color);border-radius:12px;font-size:17px;background:var(--input-bg);color:var(--text-primary);min-width:180px;font-weight:600}
        .filter-select:focus{outline:none;border-color:#2563eb}
        .table-wrapper{background:white;border-radius:14px;box-shadow:0 2px 6px rgba(0,0,0,.12);height:700px;overflow-y:scroll;overflow-x:auto;position:relative;display:block;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
        .table-wrapper::-webkit-scrollbar{width:14px}
        .table-wrapper::-webkit-scrollbar-track{background:#f1f1f1;border-radius:12px}
        .table-wrapper::-webkit-scrollbar-thumb{background:#10b981;border-radius:12px}
        .table-wrapper::-webkit-scrollbar-thumb:hover{background:#059669}
        table{width:100%;border-collapse:collapse;background:var(--card-bg);min-width:1200px;display:table}
        thead{position:sticky;top:0;z-index:10;display:table-header-group}
        tbody{display:table-row-group}
        th,td{padding:18px 16px;text-align:left;border-bottom:2px solid var(--border-color)}
        th{background:linear-gradient(135deg,#047857,#065f46);color:white;font-weight:800;font-size:16px;text-transform:uppercase;white-space:nowrap;box-shadow:0 3px 8px rgba(0,0,0,.15);text-shadow:0 1px 2px rgba(0,0,0,.2)}
        td{font-size:17px;background:var(--card-bg);color:var(--text-primary);font-weight:500;line-height:1.6}
        td:first-child{font-weight:800;font-size:18px;color:#111827}
        [data-theme="dark"] td:first-child{color:#f9fafb}
        tr:hover td{background:var(--bg-tertiary)}
        tr.critical-row td{background:#fee2e2 !important;color:#7f1d1d !important;font-weight:700 !important}
        tr.warning-row td{background:#fef3c7 !important;color:#78350f !important;font-weight:700 !important}
        [data-theme="dark"] tr.critical-row td{background:#7f1d1d !important;color:#fecaca !important}
        [data-theme="dark"] tr.warning-row td{background:#78350f !important;color:#fef3c7 !important}
        .badge{padding:7px 14px;border-radius:14px;font-size:14px;font-weight:800}
        .badge-critical{background:#fee2e2;color:#991b1b;border:2px solid #ef4444}
        .badge-warning{background:#fef3c7;color:#92400e;border:2px solid #f59e0b}
        .badge-safe{background:#d1fae5;color:#065f46;border:2px solid #10b981}
        .action-buttons{display:flex;gap:6px;flex-wrap:wrap}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:1000;padding:24px;overflow-y:auto}
        .modal.show{display:flex;align-items:center;justify-content:center}
        .modal-content{background:var(--bg-secondary);border-radius:20px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;animation:fadeIn .3s ease;box-shadow:0 20px 50px rgba(0,0,0,.3)}
        .modal-header{padding:26px;border-bottom:3px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:20px 20px 0 0}
        [data-theme="dark"] .modal-header{background:linear-gradient(135deg,#1a3a2e,#2d4a3e)}
        .modal-header h3{color:#065f46;font-size:26px;font-weight:900}
        [data-theme="dark"] .modal-header h3{color:#10b981}
        .modal-close{background:none;border:none;font-size:32px;cursor:pointer;color:var(--text-secondary);line-height:1;font-weight:700}
        .modal-close:hover{color:#ef4444;transform:scale(1.1)}
        .modal-body{padding:26px;font-size:17px}
        .modal-footer{padding:26px;border-top:3px solid var(--border-color);display:flex;gap:14px;justify-content:flex-end;flex-wrap:wrap}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .tabs{display:flex;border-bottom:3px solid var(--border-color);margin-bottom:24px;overflow-x:auto}
        .tab{padding:16px 24px;background:none;border:none;border-bottom:4px solid transparent;font-size:17px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--text-secondary);transition:all .2s}
        .tab.active{color:#2563eb;border-bottom-color:#2563eb}
        .tab:hover{color:#2563eb}
        .tab-content{display:none}
        .tab-content.active{display:block;animation:fadeIn .3s ease}
        .info-box{background:#dbeafe;border-left:5px solid #2563eb;padding:20px;border-radius:12px;margin-bottom:20px;color:#1e40af;font-size:16px;font-weight:600}
        [data-theme="dark"] .info-box{background:#1e3a5f;color:#93c5fd}
        .warning-box{background:#fef3c7;border-left:5px solid #f59e0b;padding:20px;border-radius:12px;margin-bottom:20px;color:#92400e;font-size:16px;font-weight:600}
        [data-theme="dark"] .warning-box{background:#4c3d1d;color:#fbbf24}
        .success-box{background:#d1fae5;border-left:5px solid #10b981;padding:20px;border-radius:12px;margin-bottom:20px;color:#065f46;font-size:16px;font-weight:600}
        [data-theme="dark"] .success-box{background:#1a3a2e;color:#6ee7b7}
        .danger-box{background:#fee2e2;border-left:5px solid #ef4444;padding:20px;border-radius:12px;margin-bottom:20px;color:#991b1b;font-size:16px;font-weight:600}
        [data-theme="dark"] .danger-box{background:#4c1d1d;color:#fca5a5}
        .instruction-step{background:var(--card-bg);padding:20px;margin:14px 0;border-radius:12px;border-left:5px solid #3b82f6;box-shadow:0 2px 6px var(--shadow);color:var(--text-primary);font-size:16px}
        .instruction-step strong{color:#2563eb;font-size:19px;display:block;margin-bottom:10px;font-weight:800}
        [data-theme="dark"] .instruction-step strong{color:#93c5fd;}
        .instruction-step code{background:var(--bg-tertiary);padding:4px 10px;border-radius:6px;color:var(--text-primary);font-family:monospace;font-size:15px}
        .about-section{background:var(--card-bg);padding:24px;border-radius:14px;margin-bottom:18px;border-left:5px solid #10b981;box-shadow:0 2px 6px var(--shadow);color:var(--text-primary);}
        .about-section h4{color:#059669;margin-bottom:12px;font-size:22px;font-weight:800}
        [data-theme="dark"] .about-section h4{color:#6ee7b7;}
        .about-section p{color:var(--text-primary);line-height:1.7;font-size:17px}
        .password-wrapper{position:relative;display:flex;align-items:center}
        .password-toggle{position:absolute;right:18px;cursor:pointer;font-size:24px;user-select:none;z-index:10}
        .password-toggle:hover{opacity:.7}
        .empty-state{text-align:center;padding:80px 24px;color:#9ca3af}
        .empty-state .icon{font-size:80px;margin-bottom:24px}
        .empty-state h3{font-size:24px;margin-bottom:12px;color:var(--text-secondary);font-weight:800}
        .loading{text-align:center;padding:50px;color:var(--text-secondary);font-size:18px}
        .loading-spinner{font-size:50px;display:block;margin-bottom:20px;animation:spin 1s linear infinite}
        .user-list-item{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg-tertiary);border-radius:12px;margin-bottom:12px;border:2px solid var(--border-color)}
        .user-info{display:flex;flex-direction:column;gap:6px}
        .user-email{font-weight:700;font-size:17px;color:var(--text-primary)}
        .user-meta{font-size:15px;color:var(--text-secondary);font-weight:600}
        .chart-bar{height:26px;border-radius:6px;background:linear-gradient(135deg,#10b981,#059669);transition:width .5s ease;margin:6px 0}
        .chart-label{font-size:15px;color:var(--text-secondary);margin-bottom:6px;font-weight:700}
        .progress-bar-bg{background:var(--border-color);border-radius:6px;overflow:hidden;margin-bottom:16px}
        .category-chip{display:inline-block;padding:6px 14px;border-radius:14px;font-size:14px;font-weight:700;margin:3px;background:#e0e7ff;color:#3730a3}
        .notification-dot{width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;margin-left:6px;animation:pulse 1s infinite}
        .profile-avatar{width:110px;height:110px;border-radius:50%;object-fit:cover;border:4px solid #10b981;cursor:pointer;display:block;margin:0 auto 14px;}
        .profile-avatar-placeholder{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 14px;cursor:pointer;border:4px solid #10b981;}
        .profile-header{text-align:center;padding:26px;background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:14px;margin-bottom:24px;}
        .profile-name{font-size:24px;font-weight:900;color:#1e1b4b;margin:10px 0 6px;}
        .profile-role{display:inline-block;padding:5px 16px;border-radius:24px;font-size:15px;font-weight:800;background:#6366f1;color:white;}
        .profile-section{background:var(--bg-tertiary);border-radius:12px;padding:20px;margin-bottom:18px;border:2px solid var(--border-color);color:var(--text-primary);font-size:16px}
        .profile-section h4{color:var(--text-primary);}
        [data-theme="dark"] .profile-section[style*="background:#f0fdf4"]{background:#1a3a2e !important;}
        [data-theme="dark"] .profile-section[style*="background:#fef3c7"]{background:#4c3d1d !important;}
        [data-theme="dark"] .profile-section[style*="background:#fef2f2"]{background:#4c1d1d !important;}
        [data-theme="dark"] .profile-section[style*="color:#065f46"]{color:#6ee7b7 !important;}
        [data-theme="dark"] .profile-section[style*="color:#92400e"]{color:#fbbf24 !important;}
        [data-theme="dark"] .profile-section[style*="color:#374151"],
        [data-theme="dark"] .profile-section div[style*="color:#374151"]{color:var(--text-primary) !important;}
        [data-theme="dark"] .profile-section small[style*="color:#9ca3af"]{color:var(--text-secondary) !important;}
        .profile-section h4{color:var(--text-primary);font-size:17px;font-weight:800;margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px;}
        .avatar-upload-area{position:relative;width:110px;margin:0 auto 14px;}
        .btn-email{background:#EA4335;color:white;}
        .btn-email:hover{background:#C5221F;}
        .contact-slot{display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg-tertiary);border-radius:10px;margin-bottom:8px;border:1px solid var(--border-color);transition:border-color .2s;}
        .contact-slot:hover{border-color:#25D366;}
        .contact-slot.filled{border-color:#25D366;background:#f0fdf4;}
        [data-theme="dark"] .contact-slot.filled{background:#1a3a2e;}
        .contact-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#25D366,#128C7E);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:white;font-weight:700;}

<body>
<div id="app">

                ⚠️ <strong>Opening from Downloads folder</strong> — The app will work, but for the best experience please open via a browser at <strong>http://</strong> or <strong>https://</strong>. Email/password login will still work normally.

                    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>

<script>
    console.clear();
    
    // ===================== VERSION =====================
    const APP_VERSION = '3.0.0-DESKTOP';
    const APP_BUILD_DATE = '2026-02-27';
    const DEPLOYMENT_TIMESTAMP = '2026-02-27T07:00:00Z'; // Forces cache refresh
    const VERSION_CHECK_URL = window.location.origin + window.location.pathname;
    
    console.log('%c🔔 BEEP v' + APP_VERSION,'font-size:24px;color:#10b981;font-weight:bold;');
    console.log('%c🖥️  DESKTOP OPTIMIZED','font-size:18px;color:#2563eb;font-weight:bold;');
    console.log('%cBuild Date: ' + APP_BUILD_DATE,'color:#6b7280;');
    console.log('%cDeployment: ' + DEPLOYMENT_TIMESTAMP,'color:#3b82f6;');
    console.log('%c⚠️ Emergency admin restore: restoreAdmin()','color:#ef4444;font-weight:bold;');
    
    // Force cache clear on load
    if (window.performance && performance.navigation.type === 1) {
        console.log('%c🔄 Page reloaded - cache should be fresh','color:#10b981;');
    }
    
    // Apply saved font size immediately (before login)
    try {
        const savedFs = localStorage.getItem('beep_font_size');
        if (savedFs) {
            const scale = savedFs.startsWith('custom_') ? parseInt(savedFs.split('_')[1])/100 : ({small:.9,medium:1,large:1.15,xlarge:1.3}[savedFs]||1);
            document.documentElement.style.setProperty('--fs-scale', scale);
        }
    } catch(e) {}
    
    // Initialize dark mode early (before anything renders)
    try {
        const savedTheme = localStorage.getItem('beep_theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (systemDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
    } catch(e) {}

    // ===================== STATE =====================
    let STATE = {
        user: null,
        userProfile: null,
        items: [],
        filtered: [],
        allUsers: [],
        contacts: [],
        appSettings: {},
        branches: [],
        currentBranch: null,
        stockOutRows: [], // For stock out template
        currentFilter: 'all',
        currentCategory: '',
        currentSearch: '',
        currentCheckedBy: '',
        currentDatePreset: '',
        currentDateFrom: '',
        currentDateTo: '',
        isAdmin: false,
        refreshInterval: null,
        deviceId: null,
        liveMode: false,
        sseConnection: null
    };

    const CATEGORIES = ['Dry Food', 'Beverage', 'Non Food', 'Fresh', 'Other'];
    const ADMIN_EMAILS = ['expirycontrol@gmail.com', 'admin@beep.com'];

    // ===================== FIREBASE CONFIG =====================
    const FB = {
        apiKey:      "AIzaSyAgMKOR_qFJFtfrOK2I1SkTnbQ3D-L_Bhs",
        authDomain:  "beep-app-4f046.firebaseapp.com",
        dbURL:       "https://beep-app-4f046-default-rtdb.firebaseio.com",
        projectId:   "beep-app-4f046"
    };

    // ===================== AUTH VIA REST (works on any protocol) =====================
    const AUTH_BASE = `https://identitytoolkit.googleapis.com/v1/accounts`;

    async function fbSignIn(email, password) {
        const res = await fetch(`${AUTH_BASE}:signInWithPassword?key=${FB.apiKey}`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, password, returnSecureToken: true})
        });
        const data = await res.json();
        if (data.error) throw data.error;
        return data; // {idToken, refreshToken, localId, email, ...}
    }

    async function fbSignUp(email, password) {
        const res = await fetch(`${AUTH_BASE}:signUp?key=${FB.apiKey}`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, password, returnSecureToken: true})
        });
        const data = await res.json();
        if (data.error) throw data.error;
        return data;
    }

    async function fbSendReset(email) {
        const res = await fetch(`${AUTH_BASE}:sendOobCode?key=${FB.apiKey}`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({requestType:'PASSWORD_RESET', email})
        });
        const data = await res.json();
        if (data.error) throw data.error;
        return data;
    }

    async function fbChangePassword(idToken, newPassword) {
        const res = await fetch(`${AUTH_BASE}:update?key=${FB.apiKey}`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({idToken, password: newPassword, returnSecureToken: true})
        });
        const data = await res.json();
        if (data.error) throw data.error;
        return data;
    }

    async function fbRefreshToken() {
        const stored = loadSession();
        if (!stored) return null;
        const res = await fetch(`https://securetoken.googleapis.com/v1/token?key=${FB.apiKey}`, {
            method: 'POST',
            headers: {'Content-Type':'application/x-www-form-urlencoded'},
            body: `grant_type=refresh_token&refresh_token=${stored.refreshToken}`
        });
        const data = await res.json();
        if (data.error) return null;
        stored.idToken = data.id_token;
        stored.refreshToken = data.refresh_token;
        saveSession(stored);
        return stored;
    }

    // ===================== OFFLINE WRITE QUEUE =====================
    let _writeQueue = [];
    function queueWrite(fn) {
        if (IS_ONLINE) return fn();
        _writeQueue.push(fn);
        showAlert('warning', '📵 Offline — change queued and will sync when reconnected.');
        return Promise.resolve();
    }
    window.addEventListener('online', async () => {
        if (_writeQueue.length) {
            showAlert('info', `🔄 Syncing ${_writeQueue.length} offline change(s)...`);
            const q = [..._writeQueue]; _writeQueue = [];
            for (const fn of q) { try { await fn(); } catch(e) { console.warn('Queue sync failed:', e); } }
            await fetchItems();
            showAlert('success', '✅ All offline changes synced!');
        }
    });

    // ===================== DATABASE VIA REST =====================
    async function dbGet(path) {
        const token = STATE.user?.idToken;
        const url = `${FB.dbURL}/${path}.json${token ? '?auth='+token : ''}`;
        const res = await fetch(url);
        return res.json();
    }

    async function dbSet(path, data) {
        const token = STATE.user?.idToken;
        const url = `${FB.dbURL}/${path}.json${token ? '?auth='+token : ''}`;
        const res = await fetch(url, {method:'PUT', body: JSON.stringify(data)});

    // Simple hash for offline credential check (not cryptographic, just identity matching)
    async function hashPin(str) {
        try {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32);
        } catch(e) {
            // Fallback if crypto not available
            let h = 0;
            for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
            return Math.abs(h).toString(16).padStart(32,'0');
        }
    }

    function saveOfflineCredential(email, password) {
        hashPin(email.toLowerCase() + '|' + password).then(hash => {
            try { localStorage.setItem('beep_offline_cred', JSON.stringify({ email: email.toLowerCase(), hash, savedAt: Date.now() })); } catch(e) {}
        });
    }

    async function checkOfflineCredential(email, password) {
        try {
            const raw = localStorage.getItem('beep_offline_cred');
            if (!raw) return false;
            const { email: savedEmail, hash } = JSON.parse(raw);
            if (savedEmail !== email.toLowerCase()) return false;
            const inputHash = await hashPin(email.toLowerCase() + '|' + password);
            return inputHash === hash;
        } catch(e) { return false; }
    }

    // ===================== CUSTOM PULL-TO-REFRESH =====================
    let touchStartY = 0;
    let touchCurrentY = 0;
    let pullDistance = 0;
    let isPulling = false;
    let pullThreshold = 80;

    function initPullToRefresh() {
        let pullIndicator = document.getElementById('pullIndicator');
        if (!pullIndicator) {
            pullIndicator = document.createElement('div');
            pullIndicator.id = 'pullIndicator';
            pullIndicator.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(16,185,129,.95);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:10000;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2);';
            pullIndicator.innerHTML = '⬇️ Pull to refresh';
            document.body.appendChild(pullIndicator);
        }

        document.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0) {
                touchStartY = e.touches[0].clientY;
                isPulling = true;
            }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (!isPulling || window.scrollY > 0) return;
            touchCurrentY = e.touches[0].clientY;
            pullDistance = touchCurrentY - touchStartY;
            
            // Prevent browser pull-to-refresh
            if (pullDistance > 0 && pullDistance < 150) {
                e.preventDefault();
                pullIndicator.style.opacity = Math.min(pullDistance / pullThreshold, 1);
                if (pullDistance >= pullThreshold) {
                    pullIndicator.innerHTML = '🔄 Release to refresh';
                } else {
                    pullIndicator.innerHTML = '⬇️ Pull to refresh';
                }
            }
        }, { passive: false }); // MUST be non-passive to preventDefault

        document.addEventListener('touchend', () => {
            if (isPulling && pullDistance >= pullThreshold) {
                pullIndicator.innerHTML = '⏳ Refreshing...';
                pullIndicator.style.opacity = '1';
                fetchItems().then(() => {
                    setTimeout(() => {
                        pullIndicator.style.opacity = '0';
                    }, 800);
                });
            } else {
                pullIndicator.style.opacity = '0';
            }
            isPulling = false;
            pullDistance = 0;
            touchStartY = 0;
        }, { passive: true });
    }

    /**

     */
    async function checkForUpdates() {
        try {
            const lastCheck = localStorage.getItem('beep_last_update_check');
            const now = Date.now();
            
            // Only check once per hour
            if (lastCheck && (now - parseInt(lastCheck)) < 3600000) {
                return;
            }
            
            localStorage.setItem('beep_last_update_check', now.toString());
            
            // Check if there's a newer version by trying to fetch the page
            // If content changes, hash will be different
            const currentHash = hashCode(document.documentElement.outerHTML);
            const storedHash = localStorage.getItem('beep_page_hash');
            
            if (!storedHash) {
                // First run, just store hash
                localStorage.setItem('beep_page_hash', currentHash.toString());
                return;
            }
            
            // On subsequent checks, if hash is different, there might be an update
            // (This is a simple check - in production you'd version the file)
            console.log('✅ Version check: Current v' + APP_VERSION);
            
        } catch(e) {
            // Silently fail - not critical
            console.log('Update check skipped:', e.message);
        }
    }
    
    /**
     * Simple hash function for version checking
     */
    function hashCode(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash; // Convert to 32bit integer
        }
        return hash;
    }

            const session = loadSession();
            const credOk  = await checkOfflineCredential(email, pass);
            const uid = session?.localId || session?.uid;
            const hasCachedData = uid && (!!cacheGetStale('items_admin') || !!cacheGetStale('items_' + uid));

            if (credOk && session && session.email === email && hasCachedData) {
                STATE.user = session;
                showAuthAlert('info', '📵 Signing in offline with cached data...');
                await loadApp();
                return;

                showAuthAlert('danger', '❌ Incorrect password. Cannot verify offline.');

                showAuthAlert('warning', '📵 Offline — no cached data found. Please connect to the internet for your first sign-in.');

            .then(data => {

                let msg = err.message || 'Sign in failed.';

                if (code.includes('EMAIL_NOT_FOUND') || code.includes('INVALID_LOGIN_CREDENTIALS') || code.includes('USER_NOT_FOUND'))

                else if (code.includes('INVALID_EMAIL'))

                else if (code.includes('TOO_MANY_ATTEMPTS') || code.includes('TOO_MANY_REQUESTS'))

    // ===================== LOCAL CACHE (offline + speed) =====================
    const CACHE_TTL = 5 * 60 * 1000; // 5 minutes
    function cacheSet(key, data) {
        try { localStorage.setItem('beep_cache_' + key, JSON.stringify({ data, ts: Date.now() })); } catch(e) {}
    }
    function cacheGet(key, maxAge = CACHE_TTL) {
        try {
            const raw = localStorage.getItem('beep_cache_' + key);
            if (!raw) return null;
            const { data, ts } = JSON.parse(raw);
            if (Date.now() - ts > maxAge) return null;
            return data;
        } catch(e) { return null; }
    }
    function cacheGetStale(key) { // Return even expired cache for offline fallback
        try {
            const raw = localStorage.getItem('beep_cache_' + key);
            return raw ? JSON.parse(raw).data : null;
        } catch(e) { return null; }
    }
    function cacheClear() {
        try {
            Object.keys(localStorage).filter(k => k.startsWith('beep_cache_')).forEach(k => localStorage.removeItem(k));
        } catch(e) {}

    // Safe db fetch — falls back to cache when offline
    async function dbGetCached(path, cacheKey, maxAge = CACHE_TTL) {
        if (!IS_ONLINE) {
            const stale = cacheGetStale(cacheKey);
            if (stale) return stale;
            throw new Error('Offline and no cache available');
        }
        try {
            const fresh = await dbGet(path);
            if (fresh) cacheSet(cacheKey, fresh);
            return fresh;
        } catch(e) {
            const stale = cacheGetStale(cacheKey);
            if (stale) return stale;
            throw e;
        }
    }

    // ===================== REALTIME SYNC (SSE + Live Mode) =====================
    function startRealtimeSync() {
        if (!IS_ONLINE || !STATE.user) return;
        
        // Close existing connection
        if (STATE.sseConnection) {
            STATE.sseConnection.close();
            STATE.sseConnection = null;
        }

        const token = STATE.user.idToken;
        const url = `${FB.dbURL}/items.json?auth=${token}`;
        
        try {
            const eventSource = new EventSource(url);
            STATE.sseConnection = eventSource;

            eventSource.addEventListener('put', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.data) {
                        // Full dataset received
                        const uid = STATE.user.localId || STATE.user.uid;
                        let all = Object.entries(data.data).map(([id, val]) => ({id, ...val}));
                        if (!STATE.isAdmin) all = all.filter(i => i.userId === uid);
                        const oldCount = STATE.items.length;
                        STATE.items = all.sort((a,b) => new Date(a.expiryDate) - new Date(b.expiryDate));
                        
                        // Cache it
                        const cacheKey = 'items_' + (STATE.isAdmin ? 'admin' : uid);
                        cacheSet(cacheKey, STATE.items);
                        
                        applyFilter();
                        updateStats();
                        updateLastRefresh();
                        
                        // Show notification if data changed
                        if (STATE.items.length !== oldCount) {
                            showChangeNotification();
                        }
                    }
                } catch(err) { console.warn('SSE parse error:', err); }
            });

            eventSource.addEventListener('patch', (e) => {
                // Partial update — refetch to be safe
                fetchItems();
            });

            eventSource.onerror = (e) => {
                console.warn('SSE connection error, falling back to polling');
                eventSource.close();
                STATE.sseConnection = null;
            };

        } catch(e) {
            console.warn('Failed to start SSE:', e);
        }
    }

    function stopRealtimeSync() {
        if (STATE.sseConnection) {
            STATE.sseConnection.close();
            STATE.sseConnection = null;
        }
    }

            STATE.refreshInterval = setInterval(fetchItems, 10000);

        } else {
            // Live Mode OFF: 90s polling, no SSE
            STATE.refreshInterval = setInterval(fetchItems, 90000);

            showAlert('info', '🔄 Live Mode disabled — updates every 90 seconds');
        }
        
        // Save preference
        try { localStorage.setItem('beep_live_mode', STATE.liveMode ? '1' : '0'); } catch(e) {}
        
        // Update UI

    // ===================== LOAD APP =====================
    async function loadApp() {
        const uid = STATE.user.localId || STATE.user.uid;
        const email = STATE.user.email;

        if (!IS_ONLINE) showOfflineBanner();

        // ── 1. Load profile (try cache first for instant render) ──
        const cachedProfile = cacheGet('profile_' + uid, 10 * 60 * 1000);
        if (cachedProfile) {
            STATE.userProfile = cachedProfile;
            STATE.isAdmin = cachedProfile.role === 'admin' || ADMIN_EMAILS.includes(email);
            loadFontSize();
            renderApp(); // Instant render from cache
        }

        // ── 2. Fire ALL network requests in parallel ──
        const [profileResult, settingsResult] = await Promise.allSettled([
            IS_ONLINE ? dbGet('users/' + uid) : Promise.resolve(null),
            IS_ONLINE ? dbGet('appSettings')  : Promise.resolve(null)
        ]);

        // Apply fresh profile
        const freshProfile = profileResult.status === 'fulfilled' && profileResult.value;
        if (freshProfile) {
            STATE.userProfile = freshProfile;
            cacheSet('profile_' + uid, freshProfile);
        } else if (!cachedProfile) {
            STATE.userProfile = { email, role: 'user', displayName: email.split('@')[0] };
        }
        STATE.isAdmin = STATE.userProfile.role === 'admin' || ADMIN_EMAILS.includes(email);
        loadFontSize();

        // Apply settings
        const freshSettings = settingsResult.status === 'fulfilled' && settingsResult.value;
        STATE.appSettings = freshSettings || cacheGetStale('appSettings') || {};
        if (freshSettings) cacheSet('appSettings', freshSettings);

        // ── 3. Render (if not already done from cache) ──
        renderApp();
        initDarkMode(); // Apply saved theme

        // ── 4. Load data + contacts + register device + branches in parallel ──
        await Promise.allSettled([
            fetchItems(),
            loadContacts(),
            registerDevice(),
            loadBranches()
        ]);
        
        // Set current branch from profile or localStorage
        const savedBranch = STATE.userProfile?.currentBranch || localStorage.getItem('beep_current_branch');
        if (savedBranch && STATE.branches.some(b => b.id === savedBranch)) {
            STATE.currentBranch = savedBranch;
        } else if (STATE.branches.length > 0) {
            // Default to first active branch (or first branch if none active)
            STATE.currentBranch = STATE.branches.find(b => b.active)?.id || STATE.branches[0]?.id;
        }
        updateBranchDisplay();

        // ── 5. Load Live Mode preference and start sync ──
        loadLiveModePref();
        if (STATE.liveMode) {
            STATE.refreshInterval = setInterval(fetchItems, 10000);
            startRealtimeSync();
        } else {
            STATE.refreshInterval = setInterval(fetchItems, 90000);
        }

        // ── 6. Check SMS alerts schedule (admin only) ──
        setTimeout(checkSMSAlertsSchedule, 3000); // Delay 3s to avoid blocking UI
        
        // ── 7. Initialize keyboard barcode scanner ──
        initKeyboardScanner();
        
        // ── 8. Check for app updates ──
        setTimeout(checkForUpdates, 5000); // Check after 5s to avoid blocking UI
        
        // ── 9. Show version notification on first load ──
        setTimeout(showVersionNotification, 2000); // Show after 2s
    }

    async function fetchItems() {
        try {
            const uid = STATE.user.localId || STATE.user.uid;
            const cacheKey = 'items_' + (STATE.isAdmin ? 'admin' : uid);

            // Show cached data instantly while fetching (increased TTL to 5 min)
            const cached = cacheGet(cacheKey, 5 * 60 * 1000);
            if (cached && STATE.items.length === 0) {
                STATE.items = cached;
                requestAnimationFrame(() => {
                    applyFilter();
                    updateStats();
                });
            }

            if (!IS_ONLINE) {
                const stale = cacheGetStale(cacheKey);
                if (stale) { 
                    STATE.items = stale; 
                    requestAnimationFrame(() => {
                        applyFilter(); 
                        updateStats(); 
                    });
                }
                return;
            }

            const allData = await dbGet('items');
            if (!allData) { 
                STATE.items = []; 
            } else {
                // Optimize: Use faster array operations
                const entries = Object.entries(allData);
                
                // Filter by current branch
                let filtered;
                if (STATE.currentBranch) {
                    // Filter by current branch - also include items without branchId for backward compatibility
                    filtered = entries.filter(([,val]) => 
                        val.branchId === STATE.currentBranch || !val.branchId
                    );
                } else {
                    // No branch selected - show all items (backward compatibility)
                    filtered = entries;
                }
                
                // Apply user-specific visibility
                if (!STATE.isAdmin) {
                    // Regular users see:
                    // 1. Items they created (userId === their uid)
                    // 2. Items assigned to them by admin (assignedTo === their uid)
                    // 3. Items assigned to "all" (assignedTo === 'all')
                    filtered = filtered.filter(([,val]) => 
                        val.userId === uid || 
                        val.assignedTo === uid || 
                        val.assignedTo === 'all' ||
                        !val.assignedTo // Backward compatibility: items without assignedTo field
                    );
                }
                // Admin sees all items (no additional filtering)
                
                STATE.items = filtered
                    .map(([id, val]) => ({id, ...val}))
                    .sort((a,b) => new Date(a.expiryDate) - new Date(b.expiryDate));
                
                cacheSet(cacheKey, STATE.items);
            }
            
            // Batch DOM updates in single animation frame
            requestAnimationFrame(() => {
                applyFilter();
                updateStats();
                updateLastRefresh();
            });
        } catch(e) {
            console.error('Fetch items error:', e);
            // Try stale cache
            const uid = STATE.user.localId || STATE.user.uid;
            const stale = cacheGetStale('items_' + (STATE.isAdmin ? 'admin' : uid));
            if (stale) { 
                STATE.items = stale; 
                requestAnimationFrame(() => {
                    applyFilter(); 
                    updateStats(); 
                });
            }
        }
    }

    function updateStats() {
        const total = STATE.items.length;
        const critical = STATE.items.filter(i => getStatus(i.expiryDate) === 'critical').length;
        const warning = STATE.items.filter(i => getStatus(i.expiryDate) === 'warning').length;
        const safe = STATE.items.filter(i => getStatus(i.expiryDate) === 'safe').length;
        const se = id => document.getElementById(id);
        if (se('statTotal')) se('statTotal').textContent = total;
        if (se('statCritical')) se('statCritical').textContent = critical;
        if (se('statWarning')) se('statWarning').textContent = warning;
        if (se('statSafe')) se('statSafe').textContent = safe;
        // Pulse header if critical
        if (critical > 0) document.title = `🔴 ${critical} Critical | BEEP`;
        else document.title = '🔔 BEEP - Expiry Management';
    }

    function filterByDatePreset(preset) {
        STATE.currentDatePreset = preset;

        if (preset === 'custom') {
            customRange.style.display = 'flex';

        STATE.currentDateTo = document.getElementById('dateTo')?.value || '';

    function getDateRangeForPreset(preset) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        let from = null;
        let to = null;
        
        switch(preset) {
            case 'today':
                from = new Date(today);
                to = new Date(today);
                to.setHours(23, 59, 59);
                break;
            case 'this_week':
                from = new Date(today);
                from.setDate(today.getDate() - today.getDay()); // Start of week (Sunday)
                to = new Date(from);
                to.setDate(from.getDate() + 6); // End of week (Saturday)
                to.setHours(23, 59, 59);
                break;
            case 'next_7':
                from = new Date(today);
                to = new Date(today);
                to.setDate(today.getDate() + 7);
                to.setHours(23, 59, 59);
                break;
            case 'next_14':
                from = new Date(today);
                to = new Date(today);
                to.setDate(today.getDate() + 14);
                to.setHours(23, 59, 59);
                break;
            case 'next_30':
                from = new Date(today);
                to = new Date(today);
                to.setDate(today.getDate() + 30);
                to.setHours(23, 59, 59);
                break;
            case 'this_month':
                from = new Date(today.getFullYear(), today.getMonth(), 1);
                to = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                to.setHours(23, 59, 59);
                break;
            case 'next_month':
                from = new Date(today.getFullYear(), today.getMonth() + 1, 1);
                to = new Date(today.getFullYear(), today.getMonth() + 2, 0);
                to.setHours(23, 59, 59);
                break;
        }
        
        return { from, to };
    }

    function populateCheckedByFilter() {
        const sel = document.getElementById('checkedByFilter');
        if (!sel) return;
        const names = [...new Set(STATE.items.map(i => i.checkedBy).filter(Boolean))].sort();
        const current = STATE.currentCheckedBy;
        sel.innerHTML = `<option value="">👁️ All Checked By</option>` +
            names.map(n => `<option value="${escHtml(n)}" ${current === n ? 'selected' : ''}>${escHtml(n)}</option>`).join('');
    }

    function applyFilter() {
        let items = [...STATE.items];
        if (STATE.currentFilter !== 'all')
            items = items.filter(i => getStatus(i.expiryDate) === STATE.currentFilter);
        if (STATE.currentCategory)
            items = items.filter(i => i.category === STATE.currentCategory);
        if (STATE.currentCheckedBy)
            items = items.filter(i => (i.checkedBy||'').toLowerCase() === STATE.currentCheckedBy.toLowerCase());
        
        // Date filtering
        if (STATE.currentDatePreset && STATE.currentDatePreset !== 'custom') {
            const range = getDateRangeForPreset(STATE.currentDatePreset);
            if (range.from && range.to) {
                items = items.filter(i => {
                    if (!i.expiryDate) return false;
                    const expiry = new Date(i.expiryDate);
                    return expiry >= range.from && expiry <= range.to;
                });
            }
        } else if (STATE.currentDateFrom || STATE.currentDateTo) {
            items = items.filter(i => {
                if (!i.expiryDate) return false;
                const expiry = new Date(i.expiryDate);
                if (STATE.currentDateFrom) {
                    const from = new Date(STATE.currentDateFrom);
                    if (expiry < from) return false;
                }
                if (STATE.currentDateTo) {
                    const to = new Date(STATE.currentDateTo);
                    to.setHours(23, 59, 59);
                    if (expiry > to) return false;
                }
                return true;
            });
        }
        
        if (STATE.currentSearch) {
            const s = STATE.currentSearch;
            items = items.filter(i =>
                (i.name||'').toLowerCase().includes(s) ||
                (i.category||'').toLowerCase().includes(s) ||
                (i.location||'').toLowerCase().includes(s) ||
                (i.checkedBy||'').toLowerCase().includes(s) ||
                (i.barcode||'').toLowerCase().includes(s) ||
                (i.notes||'').toLowerCase().includes(s)
            );
        }
        STATE.filtered = items;
        populateCheckedByFilter();
        renderTable();
        const fi = document.getElementById('filterInfo');
        if (fi) {
            const parts = [];
            if (STATE.currentFilter !== 'all') parts.push(`Status: ${STATE.currentFilter}`);
            if (STATE.currentCategory) parts.push(`Category: ${STATE.currentCategory}`);
            if (STATE.currentCheckedBy) parts.push(`Checked By: "${STATE.currentCheckedBy}"`);
            if (STATE.currentDatePreset && STATE.currentDatePreset !== 'custom') {
                const labels = {today:'Today',this_week:'This Week',next_7:'Next 7 Days',next_14:'Next 14 Days',next_30:'Next 30 Days',this_month:'This Month',next_month:'Next Month'};
                parts.push(`Expiry: ${labels[STATE.currentDatePreset]||STATE.currentDatePreset}`);
            } else if (STATE.currentDateFrom || STATE.currentDateTo) {
                if (STATE.currentDateFrom && STATE.currentDateTo) parts.push(`Expiry: ${STATE.currentDateFrom} to ${STATE.currentDateTo}`);
                else if (STATE.currentDateFrom) parts.push(`Expiry: From ${STATE.currentDateFrom}`);
                else if (STATE.currentDateTo) parts.push(`Expiry: Until ${STATE.currentDateTo}`);
            }
            if (STATE.currentSearch) parts.push(`Search: "${STATE.currentSearch}"`);
            fi.textContent = parts.length ? `Filtering by: ${parts.join(' | ')}` : '';
        }
        const tf = document.getElementById('tableFooter');
        if (tf) tf.textContent = `Showing ${items.length} of ${STATE.items.length} items`;
    }

    function generateTableRow(item, idx) {
        const days = getDaysLeft(item.expiryDate);

        const badgeClass = `badge-${status}`;
        const rowClass = status === 'critical' ? 'critical-row' : status === 'warning' ? 'warning-row' : '';
        const daysLabel = days < 0 ? `⚠️ ${Math.abs(days)}d EXPIRED` : days === 0 ? '⚠️ TODAY' : `${days}d`;
        return `<tr class="${rowClass}">
            <td style="font-weight:600;color:#374151">${idx+1}</td>
            <td><strong>${escHtml(item.name||'—')}</strong></td>
            <td><span class="category-chip">${escHtml(item.category||'—')}</span></td>
            <td>${escHtml(item.location||'—')}</td>
            <td><strong>${formatDate(item.expiryDate)}</strong></td>

            <td>${escHtml(item.quantity||'—')}</td>
            <td>${escHtml(item.barcode||'—')}</td>
            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(item.notes||'')}">${escHtml(item.notes||'—')}</td>

                    value="${escHtml(item.checkedBy||'')}"
                    placeholder="Enter name..."
                    title="Checked By — type and press Enter or click away to save"
                    style="width:100%;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;background:#f9fafb;"
                    onchange="saveCheckedBy('${item.id}',this.value)"

                    onblur="this.style.borderColor='#d1d5db';this.style.background='#f9fafb';">

                    <button class="btn btn-info btn-xs" onclick="viewItem('${item.id}')">👁️</button>
                    <button class="btn btn-warning btn-xs" onclick="editItem('${item.id}')">✏️</button>

    // ===================== FONT SIZE =====================
    const FS_SCALES = { small: 0.90, medium: 1.00, large: 1.15, xlarge: 1.30 };
    const FS_VALS   = { small: 90,   medium: 100,  large: 115,  xlarge: 130  };

    function applyFontSize(scale) {
        document.documentElement.style.setProperty('--fs-scale', scale);
    }

    function setFontSize(size, btn) {
        const scale = FS_SCALES[size] || 1;
        applyFontSize(scale);
        // Update button states
        document.querySelectorAll('.fs-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        // Sync slider
        const slider = document.getElementById('fsSizeSlider');
        if (slider) slider.value = FS_VALS[size] || 100;
        // Save to state + DB + localStorage
        if (STATE.userProfile) STATE.userProfile.fontSize = size;
        try { localStorage.setItem('beep_font_size', size); } catch(e) {}
        if (STATE.user) {
            const uid = STATE.user.localId || STATE.user.uid;
            dbUpdate('users/' + uid, { fontSize: size, fontSizeUpdatedAt: new Date().toISOString() }).catch(()=>{});
        }
    }

    function setFontSizeSlider(val) {
        const num = parseInt(val);
        const scale = num / 100;
        applyFontSize(scale);
        // Highlight nearest preset
        document.querySelectorAll('.fs-btn').forEach(b => b.classList.remove('active'));
        let closest = 'medium';
        let minDiff = 999;
        Object.entries(FS_VALS).forEach(([k, v]) => {
            if (Math.abs(v - num) < minDiff) { minDiff = Math.abs(v - num); closest = k; }
        });
        const matchBtn = [...document.querySelectorAll('.fs-btn')].find(b => b.title && b.title.startsWith(closest.charAt(0).toUpperCase() + closest.slice(1)));
        if (matchBtn) matchBtn.classList.add('active');
        // Save custom value
        if (STATE.userProfile) STATE.userProfile.fontSize = 'custom_' + num;
        try { localStorage.setItem('beep_font_size', 'custom_' + num); } catch(e) {}
        if (STATE.user) {
            const uid = STATE.user.localId || STATE.user.uid;
            dbUpdate('users/' + uid, { fontSize: 'custom_' + num }).catch(()=>{});
        }
    }

    function loadFontSize() {
        // Priority: DB profile → localStorage → default
        let size = STATE.userProfile?.fontSize || null;
        if (!size) { try { size = localStorage.getItem('beep_font_size'); } catch(e) {} }
        if (!size) size = 'medium';
        if (size.startsWith('custom_')) {
            const num = parseInt(size.split('_')[1]) || 100;
            applyFontSize(num / 100);
        } else {
            applyFontSize(FS_SCALES[size] || 1);
        }
    }

        const isOpen = drop.classList.contains('show');

        }
        if (chev) chev.style.transform = isOpen ? '' : 'rotate(180deg)';
        if (!isOpen) closeFeaturesMenu(); // close features if open
    }

        const drop = document.getElementById('hdrDropdown');
        const chev = document.getElementById('hdrChevron');
        if (drop) drop.classList.remove('show');
        if (chev) chev.style.transform = '';
    }

        const time = 'Updated: ' + new Date().toLocaleTimeString();
        const el = document.getElementById('lastRefresh');
        if (el) el.textContent = time;
        const el2 = document.getElementById('hdrLastRefresh');
        if (el2) el2.textContent = time;
    }

    function saveCheckedBy(id, name) {
        const trimmed = name.trim();
        // Update local state immediately so filter dropdown stays current
        const item = STATE.items.find(i => i.id === id);
        if (item) item.checkedBy = trimmed;
        // Save to DB
        dbUpdate('items/' + id, { checkedBy: trimmed, checkedAt: new Date().toISOString() })
            .then(() => {
                populateCheckedByFilter();
                if (trimmed) showAlert('success', `✅ Checked by "${trimmed}" saved!`);
            })

    // ===================== DARK MODE =====================
    function initDarkMode() {
        // Load saved preference
        const saved = localStorage.getItem('beep_theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = saved || (systemDark ? 'dark' : 'light');
        applyTheme(theme);
        
        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (!localStorage.getItem('beep_theme')) {
                applyTheme(e.matches ? 'dark' : 'light');
            }
        });
    }
    
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('beep_theme', theme);
        
        // Update toggle button if it exists
        const toggle = document.getElementById('darkModeToggle');
        if (toggle) {
            toggle.textContent = theme === 'dark' ? '🌙 Dark Mode' : '☀️ Light Mode';
        }
        
        // Save to user profile
        if (STATE.userProfile) {
            STATE.userProfile.theme = theme;
            if (STATE.user) {
                const uid = STATE.user.localId || STATE.user.uid;
                dbUpdate('users/' + uid, { theme, themeUpdatedAt: new Date().toISOString() }).catch(()=>{});
            }
        }
    }
    
    function toggleDarkMode() {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const newTheme = current === 'dark' ? 'light' : 'dark';
        applyTheme(newTheme);
    }

    async function loadBranches() {
        try {
            const data = await dbGet('branches');
            STATE.branches = data ? Object.entries(data).map(([id, val]) => ({id, ...val})) : [];
            // If no branches exist, create default
            if (STATE.branches.length === 0) {
                await createDefaultBranch();
            }
        } catch(e) {
            console.error('Load branches error:', e);
            STATE.branches = [];
        }
    }

        const defaultBranch = {
            name: 'Main Branch',
            code: 'MAIN',
            createdAt: new Date().toISOString(),
            active: true

        try {
            const newKey = await dbPush('branches', defaultBranch);
            STATE.branches = [{id: newKey.name, ...defaultBranch}];

    async function saveBranch(event) {
        event.preventDefault();
        const btn = document.getElementById('saveBranchBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Creating...';
        
        const branchData = {
            name: document.getElementById('branchName').value.trim(),
            code: document.getElementById('branchCode').value.trim().toUpperCase(),
            description: document.getElementById('branchDesc').value.trim(),
            active: document.getElementById('branchActive').checked,
            createdAt: new Date().toISOString(),
            createdBy: STATE.user.email
        };
        
        try {
            const result = await dbPush('branches', branchData);
            STATE.branches.push({id: result.name, ...branchData});
            showAlert('success', `✅ Branch "${branchData.name}" created!`);
            closeModal();
            showManageBranches();
        } catch(e) {
            showAlert('danger', '❌ Failed to create branch: ' + e.message);
            btn.disabled = false;
            btn.textContent = '💾 Create Branch';
        }
    }
    
    async function updateBranch(event, branchId) {
        event.preventDefault();
        const btn = document.getElementById('updateBranchBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Updating...';
        
        const branchData = {
            name: document.getElementById('branchName').value.trim(),
            code: document.getElementById('branchCode').value.trim().toUpperCase(),
            description: document.getElementById('branchDesc').value.trim(),
            active: document.getElementById('branchActive').checked,
            updatedAt: new Date().toISOString(),
            updatedBy: STATE.user.email
        };
        
        try {
            await dbUpdate('branches/' + branchId, branchData);
            const branch = STATE.branches.find(b => b.id === branchId);
            if (branch) Object.assign(branch, branchData);
            showAlert('success', `✅ Branch updated!`);
            closeModal();
            showManageBranches();
            updateBranchDisplay();
        } catch(e) {
            showAlert('danger', '❌ Failed to update branch: ' + e.message);
            btn.disabled = false;
            btn.textContent = '💾 Update Branch';
        }
    }
    
    async function toggleBranchStatus(branchId, active) {
        try {
            await dbUpdate('branches/' + branchId, { 
                active, 
                updatedAt: new Date().toISOString(),
                updatedBy: STATE.user.email
            });
            const branch = STATE.branches.find(b => b.id === branchId);
            if (branch) branch.active = active;
            showAlert('success', `✅ Branch ${active ? 'activated' : 'deactivated'}`);
            showManageBranches();
        } catch(e) {
            showAlert('danger', '❌ Failed to update branch status');
        }
    }
    
    async function deleteBranch(branchId, branchName) {
        if (!confirm(`Delete branch "${branchName}"?\n\n⚠️ WARNING: Items in this branch will remain but will show "Unknown Branch". This cannot be undone.`)) return;
        
        try {
            await dbDelete('branches/' + branchId);
            STATE.branches = STATE.branches.filter(b => b.id !== branchId);
            showAlert('success', `✅ Branch "${branchName}" deleted`);
            
            // If current branch was deleted, switch to first available branch
            if (STATE.currentBranch === branchId) {
                const firstBranch = STATE.branches.find(b => b.active);
                if (firstBranch) {
                    selectBranch(firstBranch.id);
                } else {
                    STATE.currentBranch = null;
                }
            }
            
            showManageBranches();
        } catch(e) {
            showAlert('danger', '❌ Failed to delete branch: ' + e.message);
        }
    }
    
    async function assignItemsToMainBranch() {
        if (!confirm('This will assign all items without a branch to "Main Branch".\n\nContinue?')) return;
        
        try {
            showAlert('info', '⏳ Assigning items to Main Branch...');
            
            // Find Main Branch
            const mainBranch = STATE.branches.find(b => b.name === 'Main Branch' || b.code === 'MAIN');
            if (!mainBranch) {
                showAlert('danger', '❌ Main Branch not found. Please create it first.');
                return;
            }
            
            // Get all items
            const allItems = await dbGet('items');
            if (!allItems) {
                showAlert('info', 'ℹ️ No items found');
                return;
            }
            
            let count = 0;
            const updates = [];
            
            // Find items without branchId
            for (const [itemId, item] of Object.entries(allItems)) {
                if (!item.branchId) {
                    updates.push(
                        dbUpdate(`items/${itemId}`, { 
                            branchId: mainBranch.id,
                            branchAssignedAt: new Date().toISOString(),
                            branchAssignedBy: STATE.user?.email || 'system'
                        })
                    );
                    count++;
                }
            }
            
            if (count === 0) {
                showAlert('info', '✅ All items already assigned to branches');
                return;
            }
            
            // Execute all updates
            await Promise.all(updates);
            
            showAlert('success', `✅ Assigned ${count} item(s) to Main Branch`);
            
            // Reload items
            await fetchItems();
            
        } catch(e) {
            console.error('Migration error:', e);
            showAlert('danger', '❌ Failed to assign items: ' + e.message);
        }
    }

    async function saveBranchAccount(event, branchId) {
        event.preventDefault();
        const btn = event.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = '⏳ Saving...';
        
        const settings = {
            address: document.getElementById('branchAddress').value.trim(),
            phone: document.getElementById('branchPhone').value.trim(),
            email: document.getElementById('branchEmail').value.trim(),
            updatedAt: new Date().toISOString(),
            updatedBy: STATE.user?.email
        };
        
        try {
            await dbUpdate(`branches/${branchId}/settings`, settings);
            
            // Update local state
            const branch = STATE.branches.find(b => b.id === branchId);
            if (branch) {
                branch.settings = {...branch.settings, ...settings};
            }
            
            showAlert('success', '✅ Branch contact info saved successfully!');
            btn.disabled = false;
            btn.textContent = '💾 Save Contact Info';
        } catch(e) {
            showAlert('danger', '❌ Failed to save: ' + e.message);
            btn.disabled = false;
            btn.textContent = '💾 Save Contact Info';
        }
    }

    /**
     * Load users assigned to a branch
     */
    async function loadBranchUsers(branchId) {
        const container = document.getElementById('branchUsersList');
        if (!container) return;
        
        try {
            // Get all users
            const usersData = await dbGet('users');
            if (!usersData) {
                container.innerHTML = `
                    <div style="text-align:center;padding:20px;color:var(--text-secondary);">
                        <div style="font-size:32px;margin-bottom:10px;">👥</div>
                        <div>No users registered yet</div>
                    </div>`;
                return;
            }
            
            // Get branch assignments
            const branchData = await dbGet(`branches/${branchId}`);
            const assignedUserIds = branchData?.assignedUsers || [];
            
            // Filter to assigned users only
            const allUsers = Object.entries(usersData)
                .map(([uid, data]) => ({ uid, ...data }))
                .filter(u => u.email);
            
            const assignedUsers = allUsers.filter(u => assignedUserIds.includes(u.uid));
            
            if (assignedUsers.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:20px;color:var(--text-secondary);">
                        <div style="font-size:32px;margin-bottom:10px;">👥</div>
                        <div>No users assigned to this branch yet</div>
                        <div style="font-size:12px;margin-top:8px;">Click "Assign User to Branch" below to add users</div>
                    </div>`;
                return;
            }
            
            // Display assigned users
            let html = '<div style="display:grid;gap:10px;">';
            assignedUsers.forEach(user => {
                const isAdmin = user.role === 'admin';
                const roleColor = isAdmin ? '#10b981' : '#6b7280';
                const roleBadge = isAdmin ? '👑 Admin' : '👤 User';
                
                html += `
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg-secondary);border-radius:8px;border:2px solid var(--border-color);">
                        <div style="flex:1;">
                            <div style="font-weight:600;color:var(--text-primary);margin-bottom:4px;">
                                ${escHtml(user.email)}
                            </div>
                            <div style="font-size:12px;color:${roleColor};">
                                ${roleBadge}
                            </div>
                        </div>
                        <button class="btn btn-danger btn-sm" style="width:auto;padding:6px 12px;" onclick="unassignUserFromBranch('${branchId}', '${user.uid}', '${escHtml(user.email).replace(/'/g, "\\'")}')">
                            ✖ Remove
                        </button>
                    </div>`;
            });
            html += '</div>';
            
            container.innerHTML = html;
        } catch(e) {
            console.error('Error loading branch users:', e);
            container.innerHTML = `
                <div style="text-align:center;padding:20px;color:#ef4444;">
                    <div style="font-size:32px;margin-bottom:10px;">❌</div>
                    <div>Error loading users</div>
                </div>`;
        }
    }

    /**
     * Load users that can be assigned to branch
     */
    async function loadAvailableUsersForBranch(branchId) {
        const dropdown = document.getElementById('userToAssign');
        if (!dropdown) return;
        
        try {
            const usersData = await dbGet('users');
            if (!usersData) {
                dropdown.innerHTML = '<option value="">No users available</option>';
                return;
            }
            
            // Get currently assigned users
            const branchData = await dbGet(`branches/${branchId}`);
            const assignedUserIds = branchData?.assignedUsers || [];
            
            // Filter to unassigned users only
            const availableUsers = Object.entries(usersData)
                .map(([uid, data]) => ({ uid, ...data }))
                .filter(u => u.email && !assignedUserIds.includes(u.uid))
                .sort((a, b) => (a.email || '').localeCompare(b.email || ''));
            
            if (availableUsers.length === 0) {
                dropdown.innerHTML = '<option value="">All users already assigned</option>';
                return;
            }
            
            let html = '<option value="">Select a user...</option>';
            availableUsers.forEach(user => {
                const label = user.email + (user.role === 'admin' ? ' (Admin)' : '');
                html += `<option value="${user.uid}">${escHtml(label)}</option>`;
            });
            
            dropdown.innerHTML = html;
        } catch(e) {
            console.error('Error loading users:', e);
            dropdown.innerHTML = '<option value="">Error loading users</option>';
        }
    }
    
    /**
     * Assign user to branch
     */
    async function doAssignUserToBranch(event, branchId) {
        event.preventDefault();
        const userId = document.getElementById('userToAssign').value;
        
        if (!userId) {
            showAlert('warning', '⚠️ Please select a user');
            return;
        }
        
        try {
            // Get current assigned users
            const branchData = await dbGet(`branches/${branchId}`);
            const assignedUsers = branchData?.assignedUsers || [];
            
            // Add user if not already assigned
            if (!assignedUsers.includes(userId)) {
                assignedUsers.push(userId);
                
                await dbUpdate(`branches/${branchId}`, {
                    assignedUsers,
                    updatedAt: new Date().toISOString(),
                    updatedBy: STATE.user.email
                });
                
                showAlert('success', '✅ User assigned to branch successfully!');
                
                // Close assign modal
                const assignModal = document.getElementById('assignUserModal');
                if (assignModal) assignModal.remove();
                
                // Reload users list in settings modal
                loadBranchUsers(branchId);
            } else {
                showAlert('info', 'ℹ️ User is already assigned to this branch');
            }
        } catch(e) {
            showAlert('danger', '❌ Error assigning user: ' + e.message);
        }
    }
    
    /**
     * Unassign user from branch
     */
    async function unassignUserFromBranch(branchId, userId, userEmail) {
        if (!confirm(`Remove ${userEmail} from this branch?\n\nThey will no longer be able to access items in this branch.`)) {
            return;
        }
        
        try {
            // Get current assigned users
            const branchData = await dbGet(`branches/${branchId}`);
            const assignedUsers = branchData?.assignedUsers || [];
            
            // Remove user
            const updatedUsers = assignedUsers.filter(uid => uid !== userId);
            
            await dbUpdate(`branches/${branchId}`, {
                assignedUsers: updatedUsers,
                updatedAt: new Date().toISOString(),
                updatedBy: STATE.user.email
            });
            
            showAlert('success', '✅ User removed from branch');
            
            // Reload users list
            loadBranchUsers(branchId);
        } catch(e) {
            showAlert('danger', '❌ Error removing user: ' + e.message);
        }
    }
